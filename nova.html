function normalizePhone(value) {
  let digits = value.replace(/\D/g, "");
  if ((digits.length === 12 || digits.length === 13) && digits.startsWith("55")) digits = digits.slice(2);
  return digits;
}
// TRAVA DE TELEFONE (na gravação, não em aviso pro Diego arrumar depois): celular BR tem DDD + 9 + 8 dígitos.
// Número antigo vem com 10 dígitos, sem o 9 - e aí o link do WhatsApp não abre. Aqui o 9 é colocado sozinho e
// o telefone sai sempre no mesmo formato. Retorna null quando não dá pra salvar (o form barra e avisa).
function corrigirTelefone(value) {
  let d = String(value || "").replace(/\D/g, "");
  if (!d) return "";
  if (d.length > 11 && d.startsWith("55")) d = d.slice(2);
  if (d.length === 10) d = d.slice(0, 2) + "9" + d.slice(2); // faltava o 9 do celular
  if (d.length !== 11) return null;
  return `+55 ${d.slice(0, 2)} ${d.slice(2, 7)}-${d.slice(7)}`;
}

function extractLead(text) {
  const raw = text || "";
  const phoneMatch = raw.match(/\(?\d{2}\)?\s?9?\d{4}-?\d{4}/);
  const phone = phoneMatch ? phoneMatch[0] : "";
  const nameMatch = raw.match(/(?:sou|meu nome é|me chamo|aqui é)\s+([A-ZÀ-Ú][a-zà-ú]+(?:\s+[A-ZÀ-Ú][a-zà-ú]+){0,2})/i);
  const name = nameMatch ? nameMatch[1].trim() : "";
  let stripped = raw;
  if (phoneMatch) stripped = stripped.replace(new RegExp(phoneMatch[0].replace(/[().]/g, "\\$&") + "\\.?", ""), " ");
  if (nameMatch) stripped = stripped.replace(new RegExp(nameMatch[0].replace(/[().]/g, "\\$&") + "\\s*,?", ""), " ");
  let service = stripped
    .replace(/^(oi|olá|ola|bom dia|boa tarde|boa noite)[,.!\s]*/i, "")
    .split("\n").find(Boolean) || "";
  service = service
    .replace(/\bmeu (whatsapp|numero|número|telefone|contato)\s*(é|e)?\s*$/i, "")
    .replace(/\bmeu (whatsapp|numero|número|telefone|contato)\b/gi, "")
    .replace(/\s*,\s*,/g, ",")
    .replace(/^[\s,.]+/, "")
    .replace(/\s+([,.!?])/g, "$1")
    .replace(/[,.]\s*[,.]/g, ".")
    .replace(/\s{2,}/g, " ")
    .trim()
    .replace(/^[,.\s]+|[,.\s]+$/g, "")
    .replace(/\s+(é|e|para|pra|no|na|em|de)$/i, "")
    .trim();
  if (!service) service = raw.split("\n").find(Boolean) || "";
  const cidade = detectCidade(raw);
  const valor = detectValor(raw);
  const prazo = detectPrazo(raw);
  const tipo = /\b(buscar|entregar|retirar|retirada|entrega|visita|visitar|avaliar|avaliação|medir|medida|levar|passar (lá|la|no local))\b/i.test(raw) ? "presencial"
    : /\b(ligar|liguei|telefonar|mandar (uma )?(mensagem|whatsapp|zap|msg)|chamar no (whats|zap|whatsapp)|responder (a )?mensagem)\b/i.test(raw) ? "remoto" : "";
  const prioridade = /\b(urgente|urgência|urgencia|emergência|emergencia|hoje mesmo|o quanto antes|correndo)\b/i.test(raw) ? "alta" : "";
  return { name, phone, service: service.slice(0, 100), cidade, valor, prazo, tipo, prioridade };
}

const DIAS_SEMANA = { domingo: 0, segunda: 1, "terça": 2, terca: 2, quarta: 3, quinta: 4, sexta: 5, "sábado": 6, sabado: 6 };
function isoData(d) { return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`; }
function detectPrazo(text) {
  const t = text.toLowerCase();
  const hoje = new Date();
  if (/\bhoje\b/.test(t)) return isoData(hoje);
  if (/\bdepois de amanh[ãa]/.test(t)) { const d = new Date(hoje); d.setDate(d.getDate() + 2); return isoData(d); }
  if (/\bamanh[ãa]/.test(t)) { const d = new Date(hoje); d.setDate(d.getDate() + 1); return isoData(d); }
  const dataExplicita = t.match(/\b(\d{1,2})\/(\d{1,2})(?:\/(\d{2,4}))?\b/);
  if (dataExplicita) {
    const dia = Number(dataExplicita[1]), mes = Number(dataExplicita[2]) - 1;
    const ano = dataExplicita[3] ? (dataExplicita[3].length === 2 ? 2000 + Number(dataExplicita[3]) : Number(dataExplicita[3])) : hoje.getFullYear();
    const d = new Date(ano, mes, dia);
    if (!isNaN(d.getTime())) { if (!dataExplicita[3] && d < hoje) d.setFullYear(d.getFullYear() + 1); return isoData(d); }
  }
  const diaDoMes = t.match(/\bdia\s+(\d{1,2})\b/);
  if (diaDoMes) { const d = new Date(hoje.getFullYear(), hoje.getMonth(), Number(diaDoMes[1])); if (d < hoje) d.setMonth(d.getMonth() + 1); return isoData(d); }
  for (const [nome, alvo] of Object.entries(DIAS_SEMANA)) {
    if (new RegExp("\\b" + nome + "(-feira)?\\b").test(t)) {
      const d = new Date(hoje); let diff = alvo - d.getDay(); if (diff <= 0) diff += 7; d.setDate(d.getDate() + diff);
      return isoData(d);
    }
  }
  return "";
}

  const date = new Date(`${value}T12:00:00`);
  return Number.isNaN(date.getTime()) ? value : date.toLocaleDateString("pt-BR", { day: "2-digit", month: "short" });
}

async function sha256(txt) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(txt));

// TRAVA DE ROTA. As praças do Diego ficam num corredor saindo de Luziânia (Valparaíso > Riacho Fundo > Águas
// Claras > Brasília), então a distância até a base serve de posição na estrada. Se a ordem do dia não for

function estradaTotalMin(paradas) {
  let total = 0, atual = CIDADE_BASE;

function analisarRotaDoDia(compromissos) {
  const paradas = (compromissos || [])

  if (paradas.length < 2) return null;
  const melhor = paradas.slice().sort((a, b) => distanciaDaBase(a.cidade) - distanciaDaBase(b.cidade));

  const [selectedId, setSelectedId] = useState(null);
  const [form, setForm] = useState(emptyForm);
  const [composer, setComposer] = useState("");
  const [files, setFiles] = useState([]);
  const [reply, setReply] = useState("");
  const [busy, setBusy] = useState(false);
  const [loading, setLoading] = useState(false);
  const [notice, setNotice] = useState(null);
  const [search, setSearch] = useState("");
  const [pinState, setPinState] = useState("checking");
  const [showGuia, setShowGuia] = useState(false);
  const [fichaId, setFichaId] = useState(null);
  const [explicar, setExplicar] = useState(null);
  const [concluirAppt, setConcluirAppt] = useState(null);
  const [addAgendaOpen, setAddAgendaOpen] = useState(false);

  const notify = useCallback((text, kind = "info") => {
    setNotice({ text, kind });
    window.setTimeout(() => setNotice(null), 4200);
  }, []);

  useEffect(() => {
    const saved = window.localStorage.getItem("tb-novo-modo");
    if (saved === "claude" || saved === "diego") setMode(saved);
    let cancelled = false;
    let authSub;
    async function boot() {
      for (let i = 0; i < 80 && !window.supabase; i++) await new Promise((resolve) => window.setTimeout(resolve, 100));
      if (!window.supabase) { if (!cancelled) { setBooting(false); notify("Não foi possível carregar a conexão de dados.", "error"); } return; }
      const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      if (cancelled) return;
      setDb(client);
      const { data } = await client.auth.getSession();
      if (!cancelled) setSession(data.session || null);
      const listener = client.auth.onAuthStateChange((_event, next) => setSession(next || null));
      authSub = listener.data.subscription;
      setBooting(false);
    }
    boot();
    return () => { cancelled = true; authSub?.unsubscribe(); };
  }, [notify]);

  const loadAll = useCallback(async () => {
    if (demo) {
      setInbox(demoInbox); setCustomers(demoCustomers); setServices(demoServices); setAppointments(demoAppointments); setFinances(demoFinance); setRotinas(demoRotinas); setFornecedores(demoFornecedores); setLoading(false); return;
    }
    if (!db || !session) return;
    setLoading(true);
    const [cx, cl, sv, ag, fn, rt, fo] = await Promise.all([
      db.from("caixa_entrada").select("*").eq("processado", false).order("criado_em", { ascending: true }),
      db.from("clientes").select("*").order("nome", { ascending: true }),
      db.from("servicos").select("*,clientes(id,nome,telefone,cidade)").order("criado_em", { ascending: false }),
      db.from("agenda").select("*").eq("status", "planejado").order("data", { ascending: true }).order("hora", { ascending: true }),
      db.from("financeiro").select("*").order("data", { ascending: false }),
      db.from("rotinas").select("*").eq("ativo", true).order("criado_em", { ascending: true }),
      db.from("fornecedores").select("*").order("nome", { ascending: true }),
    ]);
    const firstError = [cx, cl, sv, ag, fn, rt, fo].find((result) => result.error)?.error;
    if (firstError) notify(`Erro ao carregar: ${firstError.message}`, "error");
    setInbox(cx.data || []); setCustomers(cl.data || []); setServices(sv.data || []); setAppointments(ag.data || []); setFinances(fn.data || []); setRotinas(rt.data || []); setFornecedores(fo.data || []); setLoading(false);
  }, [db, demo, notify, session]);

  useEffect(() => { if (demo || session) loadAll(); }, [demo, session, loadAll]);
  useEffect(() => { window.localStorage.setItem("tb-novo-modo", mode); }, [mode]);

  useEffect(() => {
    if (demo) { setPinState("ok"); return; }
    if (!db || !session) { setPinState("checking"); return; }
    let cancelled = false;
    (async () => {
      const { data, error } = await db.from("config").select("pin_hash").eq("id", 1).single();
      if (cancelled) return;
      if (error) { setPinState("ok"); return; }
      if (!data?.pin_hash) setPinState("define");
      else if (window.sessionStorage.getItem("tb_pin_ok") === "1") setPinState("ok");
      else setPinState("enter");
    })();
    return () => { cancelled = true; };
  }, [db, session, demo]);

  const definePin = useCallback(async (pin) => {
    const hash = await sha256(pin);
    const { error } = await db.from("config").update({ pin_hash: hash }).eq("id", 1);
    if (error) { notify("Erro ao salvar PIN: " + error.message, "error"); return false; }
    window.sessionStorage.setItem("tb_pin_ok", "1");
    setPinState("ok");
    return true;
  }, [db, notify]);

  const tryPin = useCallback(async (pin) => {
    const hash = await sha256(pin);
    const { data } = await db.from("config").select("pin_hash").eq("id", 1).single();
    if (data && data.pin_hash === hash) { window.sessionStorage.setItem("tb_pin_ok", "1"); setPinState("ok"); return true; }
    return false;
  }, [db]);

  const backupAll = useCallback(async () => {
    notify("Gerando backup…", "info");
    try {
      const dump = { app: "painel-tapecaria-bahia", gerado_em: new Date().toISOString() };
      for (const t of TABELAS_BACKUP) {
        const { data, error } = await db.from(t).select("*");
        if (error) throw new Error(t + ": " + error.message);
        dump[t] = data;
      }
      const blob = new Blob([JSON.stringify(dump, null, 1)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "backup-tapecaria-" + new Date().toISOString().slice(0, 10) + ".json";
      a.click();
      URL.revokeObjectURL(a.href);
      notify("Backup baixado.", "ok");
    } catch (error) { notify("Erro no backup: " + error.message, "error"); }
  }, [db, notify]);

  const activeServices = useMemo(() => services.filter((service) => !["pago", "perdido"].includes(service.status)), [services]);
  const claudeQueue = useMemo(() => inbox.filter((item) => ["respondido", "novo"].includes(item.status || "novo")).sort((a, b) => {
    const priority = (value) => value === "respondido" ? 0 : 1;
    return priority(a.status) - priority(b.status) || new Date(a.criado_em).getTime() - new Date(b.criado_em).getTime();
  }), [inbox]);
  const working = inbox.find((item) => item.status === "em_processamento") || null;
  const waiting = inbox.filter((item) => item.status === "aguardando_voce");
  const selected = inbox.find((item) => item.id === selectedId) || null;
  const parsedSelected = parseInbox(selected?.texto || "");
  const duplicateCustomers = useMemo(() => {
    const phone = normalizePhone(form.phone);
    if (phone.length >= 10) return customers.filter((customer) => normalizePhone(customer.telefone || "") === phone);
    if (form.name.trim().length >= 3) return customers.filter((customer) => customer.nome.toLowerCase().includes(form.name.trim().toLowerCase()));
    return [];
  }, [customers, form.name, form.phone]);

  useEffect(() => {
    if (!selected) { setForm(emptyForm); return; }
    const parsed = parseInbox(selected.texto);
    const lead = extractLead(parsed.text);
    const podeAgenda = Boolean(lead.prazo && lead.tipo && (lead.tipo === "remoto" || lead.cidade));
    setForm({
      ...emptyForm,
      name: lead.name, phone: lead.phone, city: lead.cidade, service: lead.service,
      value: lead.valor, priority: lead.prioridade || "media",
      due: lead.prazo || hojeISO(),
      addAgenda: podeAgenda, agendaType: lead.tipo || "remoto",
    });
  }, [selectedId]);

  async function sendMagicLink() {
    if (!db || !email.trim()) return;
    setBusy(true);
    const { error } = await db.auth.signInWithOtp({ email: email.trim(), options: { emailRedirectTo: window.location.origin + window.location.pathname } });
    setBusy(false);
    if (error) notify(error.message, "error"); else setLoginSent(true);
  }

  async function claim(item) {
    if (demo) { setInbox((items) => items.map((entry) => entry.id === item.id ? { ...entry, status: "em_processamento", conversa: eventMessage(entry.conversa, "Triagem iniciada", mode) } : entry)); setSelectedId(item.id); return; }
    if (!db || busy) return;
    const other = inbox.find((entry) => entry.id !== item.id && entry.status === "em_processamento");
    if (other) { notify("Já existe uma entrada em triagem. Termine ou devolva antes.", "error"); return; }
    setBusy(true);
    const origin = item.status || "novo";
    let query = db.from("caixa_entrada").update({ status: "em_processamento", conversa: eventMessage(item.conversa, `Triagem iniciada · origem ${origin}`, mode) }).eq("id", item.id).eq("processado", false);
    query = item.status ? query.eq("status", item.status) : query.is("status", null);
    const { data, error } = await query.select("id").maybeSingle();
    setBusy(false);
    if (error) notify(error.message, "error"); else if (!data) notify("Outra sessão já assumiu esta entrada.", "error"); else { await loadAll(); setSelectedId(item.id); notify("Entrada assumida. Trabalhe somente nela.", "ok"); }
  }

  async function release(item) {
    const origin = (item.conversa || []).findLast((message) => message.tipo === "sistema" && message.texto.includes("origem"))?.texto.split("origem ")[1] || "novo";
    if (demo) { setInbox((items) => items.map((entry) => entry.id === item.id ? { ...entry, status: origin } : entry)); setSelectedId(null); return; }
    const { error } = await db.from("caixa_entrada").update({ status: origin, conversa: eventMessage(item.conversa, "Triagem devolvida à fila", mode) }).eq("id", item.id).eq("status", "em_processamento");
    if (error) notify(error.message, "error"); else { setSelectedId(null); await loadAll(); notify("Entrada devolvida à fila.", "ok"); }
  }

  async function resolveInbox(item, result) {
    if (demo) { setInbox((items) => items.filter((entry) => entry.id !== item.id)); setSelectedId(null); return; }
    const { error } = await db.from("caixa_entrada").update({ processado: true, status: "resolvido", conversa: eventMessage(item.conversa, `Resultado: ${result}`, mode) }).eq("id", item.id).eq("status", "em_processamento");
    if (error) throw error;
  }

  function updateForm(key, value) { setForm((current) => ({ ...current, [key]: value })); }

  async function finishCustomer(item) {
    if (!form.name.trim() || !form.service.trim() || !form.nextAction.trim() || !form.due) { notify("Nome, serviço, próxima ação e data são obrigatórios.", "error"); return; }
    if (form.addAgenda && form.agendaType === "presencial" && !form.city.trim()) { notify("Compromisso presencial precisa de cidade.", "error"); return; }
    const telefone = corrigirTelefone(form.phone);
    if (telefone === null) { notify("Telefone incompleto — celular precisa de DDD + 8 ou 9 dígitos.", "error"); return; }
    if (demo) { await resolveInbox(item, "Ficha e lead criados na demonstração"); notify("Triagem concluída na demonstração.", "ok"); return; }
    setBusy(true);
    try {
      let customer = customers.find((entry) => entry.id === form.customerId) || duplicateCustomers[0] || null;
      if (!customer) {
        const { data, error } = await db.from("clientes").insert({ nome: form.name.trim(), telefone: telefone || null, cidade: form.city.trim() || null, endereco: form.address.trim() || null, obs: parsedSelected.text || null }).select("*").single();
        if (error) throw error; customer = data;
      }
      const { data: sameServices, error: serviceSearchError } = await db.from("servicos").select("*").eq("cliente_id", customer.id).ilike("titulo", form.service.trim()).limit(1);
      if (serviceSearchError) throw serviceSearchError;
      let service = sameServices?.[0] || null;
      if (!service) {
        const { data, error } = await db.from("servicos").insert({ cliente_id: customer.id, titulo: form.service.trim(), status: form.serviceStatus, prioridade: form.priority, proxima_acao: form.nextAction.trim(), prazo: form.due, valor_orcamento: Number(form.value.replace(",", ".")) || null, responsavel: form.responsavel.trim() || null }).select("*").single();
        if (error) throw error; service = data;
      }
      if (form.addAgenda) {
        const occupied = appointments.filter((entry) => entry.data === form.due && entry.tipo === "presencial").map((entry) => entry.hora?.slice(0, 5));
        const fallback = horariosParaTipo(form.due, form.agendaType, occupied)[0] || "18:00";
        const appointment = { titulo: `${customer.nome} — ${form.service.trim()}`, data: form.due, hora: form.time || fallback, cidade: form.agendaType === "presencial" ? form.city.trim() : null, tipo: form.agendaType, status: "planejado", servico_id: service.id };
        const { data: linked } = await db.from("agenda").select("id").eq("servico_id", service.id).eq("status", "planejado").limit(1);
        if (linked?.length) { const { error } = await db.from("agenda").update(appointment).eq("id", linked[0].id); if (error) throw error; }
        else { const { error } = await db.from("agenda").insert(appointment); if (error) throw error; }
      }
      if (parsedSelected.imageUrl) {
        const { data: photo } = await db.from("fotos").select("id").eq("cliente_id", customer.id).eq("url", parsedSelected.imageUrl).limit(1);
        if (!photo?.length) await db.from("fotos").insert({ cliente_id: customer.id, url: parsedSelected.imageUrl, tipo: "outro" });
      }
      await db.from("historico").insert({ o_que: `Triagem concluída: ${form.service.trim()}`, por: mode, detalhe: `Fonte caixa_entrada#${item.id} · cliente#${customer.id} · serviço#${service.id}` });
      await resolveInbox(item, `cliente #${customer.id} · serviço #${service.id}`);
      await loadAll(); notify("Ficha e serviço conferidos e salvos.", "ok");
    } catch (error) { notify(`Nada foi encerrado: ${error.message}`, "error"); }
    finally { setBusy(false); }
  }

  async function finishAgenda(item) {
    if (!form.service.trim() || !form.due || (form.agendaType === "presencial" && !form.city.trim())) { notify("Título, data e cidade presencial são obrigatórios.", "error"); return; }
    if (demo) { await resolveInbox(item, "Compromisso criado na demonstração"); notify("Compromisso registrado.", "ok"); return; }
    setBusy(true);
    try {
      const occupied = appointments.filter((entry) => entry.data === form.due && entry.tipo === "presencial").map((entry) => entry.hora?.slice(0, 5));
      const fallback = horariosParaTipo(form.due, form.agendaType, occupied)[0] || "18:00";
      const payload = { titulo: form.service.trim(), data: form.due, hora: form.time || fallback, cidade: form.agendaType === "presencial" ? form.city.trim() : null, tipo: form.agendaType, status: "planejado" };
      const { data: same } = await db.from("agenda").select("id").eq("titulo", payload.titulo).eq("data", payload.data).eq("status", "planejado").limit(1);
      let id = same?.[0]?.id;
      if (!id) { const { data, error } = await db.from("agenda").insert(payload).select("id").single(); if (error) throw error; id = data.id; }
      await resolveInbox(item, `compromisso #${id}`); await loadAll(); notify("Compromisso salvo sem duplicar.", "ok");
    } catch (error) { notify(`Nada foi encerrado: ${error.message}`, "error"); }
    finally { setBusy(false); }
  }

  async function finishFinance(item) {
    if (mode === "claude") { notify("Financeiro exige Diego.", "error"); return; }
    const value = Number(form.value.replace(",", "."));
    if (!form.service.trim() || !form.due || !(value > 0)) { notify("Descrição, valor e data são obrigatórios.", "error"); return; }
    if (demo) { await resolveInbox(item, "Lançamento criado na demonstração"); notify("Lançamento registrado.", "ok"); return; }
    setBusy(true);
    try {
      const payload = { tipo: form.financeType, escopo: form.financeScope, categoria: "Outro", valor: value, descricao: form.service.trim(), status: form.financeStatus, data: form.due };
      const { data: same } = await db.from("financeiro").select("id").eq("tipo", payload.tipo).eq("valor", payload.valor).eq("data", payload.data).eq("descricao", payload.descricao).limit(1);
      let id = same?.[0]?.id;
      if (!id) { const { data, error } = await db.from("financeiro").insert(payload).select("id").single(); if (error) throw error; id = data.id; }
      await resolveInbox(item, `financeiro #${id}`); await loadAll(); notify("Lançamento salvo sem duplicar.", "ok");
    } catch (error) { notify(`Nada foi encerrado: ${error.message}`, "error"); }
    finally { setBusy(false); }
  }

  async function askDiego(item) {
    if (!form.question.trim()) { notify("Escreva uma pergunta objetiva.", "error"); return; }
    if (!form.checkedCustomers || !form.checkedAgenda || !form.checkedFinance) { notify("Confira Clientes, Agenda e Financeiro antes de perguntar.", "error"); return; }
    const conversation = [...(item.conversa || []), { de: "ia", texto: form.question.trim(), em: new Date().toISOString() }];
    if (demo) { setInbox((items) => items.map((entry) => entry.id === item.id ? { ...entry, status: "aguardando_voce", conversa: conversation } : entry)); setSelectedId(null); notify("Pergunta enviada para o Diego.", "ok"); return; }
    const { error } = await db.from("caixa_entrada").update({ status: "aguardando_voce", conversa: conversation }).eq("id", item.id).eq("status", "em_processamento");
    if (error) notify(error.message, "error"); else { setSelectedId(null); await loadAll(); notify("Pergunta registrada no app.", "ok"); }
  }

  async function editInboxNote(item, novoTexto) {
    const parsed = parseInbox(item.texto);
    const payload = buildInboxPayload(parsed.images, novoTexto);
    if (demo) { setInbox((items) => items.map((entry) => entry.id === item.id ? { ...entry, texto: payload } : entry)); notify("Na demonstração não salva.", "info"); return; }
    const { error } = await db.from("caixa_entrada").update({ texto: payload }).eq("id", item.id);
    if (error) notify("Erro: " + error.message, "error"); else { await loadAll(); notify("Anotação atualizada.", "ok"); }
  }

  async function deleteInboxItem(item) {
    if (demo) { setInbox((items) => items.filter((entry) => entry.id !== item.id)); setSelectedId(null); notify("Na demonstração não salva.", "info"); return; }
    const { error } = await db.from("caixa_entrada").delete().eq("id", item.id);
    if (error) notify("Erro: " + error.message, "error"); else { setSelectedId(null); await loadAll(); notify("Item excluído.", "ok"); }
  }

  async function answer(item) {
    if (!reply.trim()) return;
    const conversation = [...(item.conversa || []), { de: "diego", texto: reply.trim(), em: new Date().toISOString() }];
    if (demo) { setInbox((items) => items.map((entry) => entry.id === item.id ? { ...entry, status: "respondido", conversa: conversation } : entry)); setReply(""); notify("Resposta enviada.", "ok"); return; }
    const { error } = await db.from("caixa_entrada").update({ status: "respondido", conversa: conversation }).eq("id", item.id).eq("status", "aguardando_voce");
    if (error) notify(error.message, "error"); else { setReply(""); await loadAll(); notify("Resposta enviada para a fila do Claude.", "ok"); }
  }

  async function addInbox() {
    if (!composer.trim() && !files.length) return;
    if (demo) { setInbox((items) => [...items, { id: `demo-${Date.now()}`, texto: composer.trim(), status: "novo", conversa: [], criado_em: new Date().toISOString(), processado: false }]); setComposer(""); setFiles([]); notify("Entrada adicionada na demonstração.", "ok"); return; }
    setBusy(true);
    try {
      const texto = composer.trim();
      const uploaded = [];
      for (const f of files) {
        const path = `caixa-entrada/${Date.now()}_${f.name.replace(/[^a-zA-Z0-9._-]/g, "_")}`;
        const { error: uploadError } = await db.storage.from("fotos-servicos").upload(path, f); if (uploadError) throw uploadError;
        const { data, error } = await db.storage.from("fotos-servicos").createSignedUrl(path, 60 * 60 * 24 * 365); if (error) throw error;
        uploaded.push({ url: data.signedUrl, fileName: f.name });
      }
      const payload = buildInboxPayload(uploaded, texto);
      const { error } = await db.from("caixa_entrada").insert({ texto: payload, status: "novo", conversa: [], processado: false }); if (error) throw error;
      setComposer(""); setFiles([]); await loadAll(); notify("Entrada salva na fila.", "ok");
    } catch (error) { notify(error.message, "error"); }
    finally { setBusy(false); }
  }

  async function copyContext() {
    const items = [...(working ? [working] : []), ...claudeQueue].slice(0, 8);
    const lines = ["TAPEÇARIA BAHIA — CONTEXTO ENXUTO", "Regra: uma entrada por vez; pesquisar antes de criar; nunca excluir/enviar/pagar no modo Claude.", ""];
    items.forEach((item, index) => { const parsed = parseInbox(item.texto); const last = [...(item.conversa || [])].reverse().find((message) => message.tipo !== "sistema"); lines.push(`${index + 1}. [${item.status || "novo"}] #${item.id}: ${parsed.text.slice(0, 360) || "[print]"}`); if (last) lines.push(`Última mensagem (${last.de}): ${last.texto.slice(0, 180)}`); });
    await navigator.clipboard.writeText(lines.join("\n")); notify("Contexto enxuto copiado.", "ok");
  }

  const abrirReagendar = (a) => setExplicar({ item: { tipoItem: "agenda", id: a.id, titulo: a.titulo, cidade: a.cidade, tipo: a.tipo, servico_id: a.servico_id }, kind: "reagendar" });
  // Atualização otimista: some da tela na hora; o loadAll depois só reconcilia com o banco.
  const aplicarResolucao = useCallback((patch) => {
    if (!patch) return;
    if (patch.servicoId) setServices((prev) => prev.map((s) => s.id === patch.servicoId ? { ...s, proxima_acao: patch.proximaAcao ?? null } : s));
    if (patch.agendaId) setAppointments((prev) => prev.filter((a) => a.id !== patch.agendaId));
  }, []);

  if (booting) return <div className="loading-screen"><div className="brand-seal">TB</div><p>Preparando a central…</p></div>;
  if (!session && !demo) return <div className="login-screen"><div className="login-card"><div className="brand-seal">TB</div><p className="kicker">NOVA CENTRAL OPERACIONAL</p><h1>Tapeçaria Bahia</h1><p>Um ambiente separado para Diego e Claude trabalharem na mesma fila, sem apagar, duplicar ou perder o próximo passo.</p>{loginSent ? <div className="success-box">Link enviado. Abra seu e-mail neste aparelho.</div> : <><label>E-mail de acesso<input type="email" value={email} onChange={(event) => setEmail(event.target.value)} placeholder="seu@email.com" onKeyDown={(event) => event.key === "Enter" && sendMagicLink()} /></label><button className="primary" onClick={sendMagicLink} disabled={busy || !email.trim()}>Enviar link de acesso</button></>}<button className="ghost demo-button" onClick={() => setDemo(true)}>Ver demonstração do novo site</button></div></div>;
  if (!demo && pinState === "checking") return <div className="loading-screen"><div className="brand-seal">TB</div><p>Verificando o bloqueio…</p></div>;
  if (!demo && (pinState === "define" || pinState === "enter")) return <PinScreen mode={pinState} onDefine={definePin} onEnter={tryPin} />;

  const valesPendentes = finances.filter((f) => f.categoria === "Vale" && f.status === "a_pagar").length;
  const contasFuturas = finances.filter(ehSaidaFutura).length;
  const nav = [
    { id: "painel", label: "Painel", icon: "⌂" }, { id: "caixa", label: "Caixa", icon: "◎", count: inbox.length }, { id: "leads", label: "Leads", icon: "◇", count: activeServices.length },
    { id: "agenda", label: "Agenda", icon: "□" }, { id: "financeiro", label: "Financeiro", icon: "$" }, { id: "compras", label: "Compras", icon: "▣" }, { id: "futuro", label: "A pagar", icon: "◷", count: contasFuturas }, { id: "vales", label: "Vales", icon: "✎", count: valesPendentes },

  ];

    </aside>
    <main className="workspace">

      {tab === "caixa" && <div className="inbox-layout">
        <section className="queue-column">
          <div className="composer"><textarea value={composer} onChange={(event) => setComposer(event.target.value)} placeholder="Cole uma mensagem, descreva o atendimento ou acrescente uma orientação…" />{files.length > 0 && <div className="composer-files">{files.map((f, i) => <span key={i} className="composer-file-chip">{f.name}<button type="button" onClick={() => setFiles((fs) => fs.filter((_, idx) => idx !== i))}>✕</button></span>)}</div>}<div className="composer-actions"><label className="file-button">{files.length ? `${files.length} print(s)` : "Adicionar print(s)"}<input type="file" accept="image/*" multiple onChange={(event) => setFiles((fs) => [...fs, ...Array.from(event.target.files || [])])} /></label><button className="primary" onClick={addInbox} disabled={busy || (!composer.trim() && !files.length)}>Salvar na fila</button></div></div>
          <div className="queue-summary"><div><span>Para Claude</span><b>{claudeQueue.length}</b></div><div><span>Em triagem</span><b>{working ? 1 : 0}</b></div><div><span>Aguardando você</span><b>{waiting.length}</b></div></div>
          {working && <QueueItem item={working} selected={selectedId === working.id} onOpen={() => setSelectedId(working.id)} />}
          {claudeQueue.map((item) => <QueueItem key={item.id} item={item} selected={selectedId === item.id} onOpen={() => setSelectedId(item.id)} />)}
          {waiting.map((item) => <QueueItem key={item.id} item={item} selected={selectedId === item.id} onOpen={() => setSelectedId(item.id)} />)}

        </section>
        <section className="triage-column">
          {!selected && <div className="triage-welcome"><div className="big-orb">◎</div><p className="kicker">UMA TAREFA POR VEZ</p><h2>{working ? "Retome a triagem em andamento" : claudeQueue.length ? "Abra o próximo item da fila" : "Nada pede ação agora"}</h2><p>O conteúdo original, as buscas e o formulário ficam juntos para evitar releitura e cliques errados.</p>{working ? <button className="primary" onClick={() => setSelectedId(working.id)}>Retomar</button> : claudeQueue[0] && <button className="primary" onClick={() => claim(claudeQueue[0])}>Pegar próximo item</button>}</div>}
          {selected && <TriagePanel item={selected} parsed={parsedSelected} mode={mode} form={form} updateForm={updateForm} customers={customers} duplicateCustomers={duplicateCustomers} services={services} appointments={appointments} finances={finances} busy={busy} reply={reply} setReply={setReply} onClaim={() => claim(selected)} onRelease={() => release(selected)} onAnswer={() => answer(selected)} onCustomer={() => finishCustomer(selected)} onAgenda={() => finishAgenda(selected)} onFinance={() => finishFinance(selected)} onAsk={() => askDiego(selected)} onEdit={(texto) => editInboxNote(selected, texto)} onDelete={() => deleteInboxItem(selected)} />}
        </section>
      </div>}

      {tab === "painel" && <Dashboard inbox={inbox} services={activeServices} appointments={appointments} finances={finances} rotinas={rotinas} customers={customers} fornecedores={fornecedores} db={db} demo={demo} notify={notify} onRotinaChanged={loadAll} onOpenFicha={setFichaId} onOpenQueue={() => setTab("caixa")} onConcluir={setConcluirAppt} onReschedule={abrirReagendar} onSemProximaAcao={() => { setLeadsFiltroInicial("sem_acao"); setTab("leads"); }} />}
      {tab === "leads" && <LeadsView services={activeServices} search={search} setSearch={setSearch} onOpenFicha={setFichaId} initialFiltro={leadsFiltroInicial} onConsumedInitialFiltro={() => setLeadsFiltroInicial("todos")} />}
      {tab === "agenda" && <AgendaView appointments={appointments} services={services} finances={finances} onReschedule={abrirReagendar} onConcluir={setConcluirAppt} onAdd={() => setAddAgendaOpen(true)} />}
      {tab === "financeiro" && <FinanceView finances={finances} onVerAPagar={() => setTab("futuro")} />}
      {tab === "compras" && <ComprasView finances={finances} fornecedores={fornecedores} services={services} appointments={appointments} db={db} demo={demo} mode={mode} notify={notify} onChanged={loadAll} />}
      {tab === "futuro" && <FuturoView finances={finances} db={db} demo={demo} mode={mode} notify={notify} onChanged={loadAll} />}
      {tab === "vales" && <ValesView finances={finances} db={db} demo={demo} notify={notify} onChanged={loadAll} />}

    </main>
    <nav className="mobile-nav">{nav.map((item) => <button key={item.id} className={tab === item.id ? "active" : ""} onClick={() => { setTab(item.id); setSelectedId(null); }}><i>{item.icon}</i><span>{item.label}</span></button>)}</nav>
    {showGuia && <GuiaModal db={db} demo={demo} notify={notify} onClose={() => setShowGuia(false)} />}
    {fichaId && <FichaModal db={db} demo={demo} notify={notify} clienteId={fichaId} fornecedores={fornecedores} onClose={() => setFichaId(null)} onChanged={loadAll} />}
    {explicar && <ExplicarModal db={db} demo={demo} notify={notify} item={explicar.item} kind={explicar.kind} onClose={() => setExplicar(null)} onDone={(patch) => { setExplicar(null); aplicarResolucao(patch); if (!demo) loadAll(); }} />}
    {concluirAppt && <ConcluirModal db={db} demo={demo} notify={notify} appt={concluirAppt} onClose={() => setConcluirAppt(null)} onDone={(patch) => { setConcluirAppt(null); aplicarResolucao(patch); if (!demo) loadAll(); }} />}
    {addAgendaOpen && <AddAgendaModal appointments={appointments} db={db} demo={demo} notify={notify} onClose={() => setAddAgendaOpen(false)} onDone={() => { setAddAgendaOpen(false); loadAll(); }} />}
  </div>;
}

function PinScreen({ mode, onDefine, onEnter }) {
  const [digits, setDigits] = useState("");
  const [first, setFirst] = useState(null);
  const [error, setError] = useState("");
  const [confirming, setConfirming] = useState(false);
  const press = async (key) => {
    setError("");
    if (key === "⌫") { setDigits((d) => d.slice(0, -1)); return; }
    if (digits.length >= 4) return;
    const next = digits + key;
    setDigits(next);
    if (next.length < 4) return;
    if (mode === "define") {
      if (!confirming) { setFirst(next); setConfirming(true); setDigits(""); return; }
      if (next !== first) { setError("Os PINs não batem. Comece de novo."); setFirst(null); setConfirming(false); setDigits(""); return; }
      const ok = await onDefine(next);
      if (!ok) { setDigits(""); }
    } else {
      const ok = await onEnter(next);
      if (!ok) { setError("PIN incorreto."); setDigits(""); }
    }
  };
  const title = mode === "define" ? (confirming ? "Confirme o PIN" : "Crie um PIN") : "Digite seu PIN";
  const sub = mode === "define" ? (confirming ? "Digite os 4 dígitos de novo." : "Escolha 4 dígitos para travar o app no dia a dia.") : "4 dígitos para desbloquear a central.";
  return <div className="login-screen"><div className="login-card pin-card"><div className="brand-seal">TB</div><p className="kicker">{title}</p><p className="pin-sub">{sub}</p><div className="pin-dots">{[0, 1, 2, 3].map((i) => <span key={i} className={i < digits.length ? "filled" : ""} />)}</div>{error && <div className="pin-error">{error}</div>}<div className="pin-pad">{["1", "2", "3", "4", "5", "6", "7", "8", "9", "", "0", "⌫"].map((key, i) => key === "" ? <span key={i} /> : <button key={i} className="pin-key" onClick={() => press(key)}>{key}</button>)}</div></div></div>;
}

function GuiaModal({ db, demo, notify, onClose }) {
  const [rows, setRows] = useState(null);
  const [drafts, setDrafts] = useState({ empresa: "", como_agir: "", regras: "" });
  const [savingSec, setSavingSec] = useState("");
  useEffect(() => {
    if (demo) { setRows([]); setDrafts({ empresa: "(demonstração) Reforma de estofados em Luziânia-GO e região.", como_agir: "(demonstração) Ler a caixa, pesquisar antes de criar, uma entrada por vez.", regras: REGRAS_SISTEMA_ATUAIS }); return; }
    (async () => {
      const { data, error } = await db.from("guia_ia").select("*").order("secao");
      if (error) { notify("Erro ao ler o guia: " + error.message, "error"); setRows([]); return; }
      setRows(data || []);
      const next = { empresa: "", como_agir: "", regras: "" };
      (data || []).forEach((r) => { if (r.secao in next) next[r.secao] = r.conteudo || ""; });
      setDrafts(next);
    })();
  }, [db, demo, notify]);
  const save = async (sec) => {
    if (demo) { notify("Na demonstração o guia não é salvo.", "info"); return; }
    setSavingSec(sec);
    const { error } = await db.from("guia_ia").upsert({ secao: sec, titulo: SECAO_LABEL[sec], conteudo: drafts[sec], atualizado_em: new Date().toISOString() }, { onConflict: "secao" });
    setSavingSec("");
    if (error) notify("Erro: " + error.message, "error"); else notify("Guia atualizado.", "ok");
  };
  return <div className="modal-overlay" onMouseDown={(e) => { if (e.target === e.currentTarget) onClose(); }}>
    <div className="modal-card">
      <div className="modal-head"><div><p className="kicker">CARTILHA DA IA</p><h2>Guia da IA</h2></div><button className="ghost" onClick={onClose}>Fechar</button></div>
      <p className="modal-intro">A cartilha que qualquer IA lê antes de operar. Edite para mudar como a IA se comporta.</p>
      {rows === null ? <div className="empty-state"><b>Carregando…</b></div> : <>
        <div className="guia-block readonly"><h3>Regras automáticas vigentes</h3><pre>{REGRAS_SISTEMA_ATUAIS}</pre></div>
        {["empresa", "como_agir", "regras"].map((sec) => <div className="guia-block" key={sec}><h3>{SECAO_LABEL[sec]}</h3><textarea value={drafts[sec]} onChange={(e) => setDrafts((d) => ({ ...d, [sec]: e.target.value }))} /><button className="primary" onClick={() => save(sec)} disabled={savingSec === sec}>{savingSec === sec ? "Salvando…" : "Salvar"}</button></div>)}
      </>}
    </div>
  </div>;
}

function QueueItem({ item, selected, onOpen }) {
  const parsed = parseInbox(item.texto); const status = item.status || "novo";
  return <button className={`queue-item ${selected ? "selected" : ""} status-${status}`} onClick={onOpen}><div className="queue-top"><span className="status-pill">{statusLabel[status]}</span><time>{new Date(item.criado_em).toLocaleDateString("pt-BR", { day: "2-digit", month: "2-digit" })}</time></div><strong>{parsed.text.slice(0, 92) || "Print sem anotação"}</strong><small>{parsed.images.length ? `${parsed.images.length > 1 ? parsed.images.length + " imagens" : "Contém imagem"} · ` : ""}{item.conversa?.length ? `${item.conversa.length} mensagem(ns)` : "Sem conversa"}</small></button>;
}

function TriagePanel(props) {
  const { item, parsed, mode, form, updateForm, customers, duplicateCustomers, services, appointments, busy, reply, setReply } = props;
  const status = item.status || "novo";
  const [editing, setEditing] = useState(false);
  const [editText, setEditText] = useState(parsed.text);
  const [confirmDelete, setConfirmDelete] = useState(false);
  const [profissionalAberto, setProfissionalAberto] = useState(null);
  useEffect(() => { setEditText(parsed.text); setEditing(false); setConfirmDelete(false); }, [item.id]);
  const relatedServices = form.customerId ? services.filter((entry) => entry.cliente_id === form.customerId && !["pago", "perdido"].includes(entry.status)) : [];
  const cityConflicts = form.due && form.agendaType === "presencial" ? appointments.filter((entry) => entry.data === form.due && entry.tipo === "presencial" && entry.cidade && form.city && entry.cidade.toLowerCase() !== form.city.toLowerCase()) : [];
  const porProfissional = useMemo(() => {
    const map = {};
    services.forEach((s) => { if (s.responsavel && ["lead", "orcamento", "agendado", "producao"].includes(s.status)) { const k = s.responsavel.trim(); (map[k] ||= []).push(s); } });
    return map;
  }, [services]);
  return <div className="triage-panel">
    <div className="triage-head"><div><span className={`status-pill status-${status}`}>{statusLabel[status]}</span><h2>Entrada #{String(item.id).slice(0, 8)}</h2></div>
      <div className="triage-head-actions">
        {status === "em_processamento" && <button className="ghost" onClick={props.onRelease}>Devolver à fila</button>}
        {!editing && !confirmDelete && <button className="ghost" onClick={() => setEditing(true)}>✎ Editar</button>}
        {!confirmDelete && <button className="ghost" onClick={() => setConfirmDelete(true)}>🗑 Excluir</button>}
      </div>
    </div>
    {confirmDelete && <div className="danger-box confirm-row"><span>Excluir esta entrada da caixa? Não dá pra desfazer.</span><div><button className="primary" onClick={props.onDelete}>Sim, excluir</button><button className="ghost" onClick={() => setConfirmDelete(false)}>Cancelar</button></div></div>}
    {editing ? <article className="source-card"><p className="kicker">EDITAR ANOTAÇÃO</p><textarea className="edit-note" value={editText} onChange={(e) => setEditText(e.target.value)} />{!!parsed.images.length && <div className="source-gallery">{parsed.images.map((img, i) => <a key={i} href={img.url} target="_blank" rel="noreferrer"><img src={img.url} alt={img.fileName} /></a>)}</div>}<div className="ficha-actions"><button className="primary" onClick={() => { props.onEdit(editText); setEditing(false); }}>Salvar</button><button className="ghost" onClick={() => { setEditText(parsed.text); setEditing(false); }}>Cancelar</button></div></article>
    : <article className="source-card"><p className="kicker">CONTEÚDO ORIGINAL{parsed.images.length > 1 ? ` · ${parsed.images.length} imagens` : ""}</p><p>{parsed.text || "Print sem texto adicional."}</p>{!!parsed.images.length && <div className="source-gallery">{parsed.images.map((img, i) => <a key={i} href={img.url} target="_blank" rel="noreferrer"><img src={img.url} alt={img.fileName} /></a>)}</div>}</article>}
    {!!item.conversa?.length && <div className="conversation">{item.conversa.map((message, index) => <div key={`${message.em}-${index}`} className={`bubble ${message.de} ${message.tipo || ""}`}><span>{message.de === "ia" ? "Claude" : "Diego"}</span>{message.texto}</div>)}</div>}
    {status === "aguardando_voce" && <div className="answer-box"><label>Sua resposta para o Claude<textarea value={reply} onChange={(event) => setReply(event.target.value)} placeholder="Responda aqui; a entrada voltará automaticamente para a fila do Claude." /></label><button className="primary" onClick={props.onAnswer} disabled={!reply.trim()}>Enviar resposta</button></div>}
    {["novo", "respondido"].includes(status) && <div className="claim-box"><h3>Esta entrada ainda não está travada.</h3><p>Assuma antes de alterar dados. Se outra sessão já pegou, esta operação será recusada.</p><button className="primary" onClick={props.onClaim} disabled={busy}>Iniciar triagem segura</button></div>}
    {status === "em_processamento" && <>
      <div className="classify"><p className="kicker">1 · CLASSIFICAR RESULTADO</p>{[['cliente','Cliente e serviço'],['agenda','Compromisso avulso'],['financeiro','Financeiro avulso']].map(([id, label]) => <button key={id} className={form.kind === id ? "active" : ""} onClick={() => updateForm("kind", id)} disabled={id === "financeiro" && mode === "claude"}>{label}{id === "financeiro" && mode === "claude" ? " · Diego" : ""}</button>)}</div>
      {form.kind === "cliente" && <div className="form-grid">
        <p className="form-title">2 · Cliente e serviço</p>
        <label>Cliente existente<select value={form.customerId} onChange={(event) => { const customer = customers.find((entry) => entry.id === event.target.value); updateForm("customerId", event.target.value); if (customer) { updateForm("name", customer.nome); updateForm("phone", customer.telefone || ""); updateForm("city", customer.cidade || ""); updateForm("address", customer.endereco || ""); } }}><option value="">Criar ou localizar pelos dados</option>{customers.map((customer) => <option key={customer.id} value={customer.id}>{customer.nome}{customer.telefone ? ` · ${customer.telefone}` : ""}</option>)}</select></label>
        <div className="row"><label>Nome*<input value={form.name} onChange={(event) => updateForm("name", event.target.value)} /></label><label>Telefone<input value={form.phone} onChange={(event) => updateForm("phone", event.target.value)} /></label></div>
        {duplicateCustomers.length > 0 && <div className="duplicate-warning"><b>Possível ficha existente</b>{duplicateCustomers.map((customer) => <button key={customer.id} onClick={() => updateForm("customerId", customer.id)}>Usar {customer.nome} · {customer.telefone}</button>)}</div>}
        <div className="row"><label>Cidade<input value={form.city} onChange={(event) => updateForm("city", event.target.value)} /></label><label>Endereço<input value={form.address} onChange={(event) => updateForm("address", event.target.value)} /></label></div>
        <label>Serviço/pedido*<input value={form.service} onChange={(event) => updateForm("service", event.target.value)} /></label>
        {!!relatedServices.length && <div className="duplicate-warning"><b>Serviços abertos deste cliente</b>{relatedServices.map((service) => <span key={service.id}>{service.titulo} · {statusLabel[service.status]}</span>)}</div>}
        <div className="row three"><label>Status<select value={form.serviceStatus} onChange={(event) => updateForm("serviceStatus", event.target.value)}><option value="lead">Novo lead</option><option value="orcamento">Orçamento</option><option value="agendado">Agendado</option></select></label><label>Prioridade<select value={form.priority} onChange={(event) => updateForm("priority", event.target.value)}><option value="baixa">Baixa</option><option value="media">Média</option><option value="alta">Alta</option></select></label><label>Orçamento R$<input value={form.value} inputMode="decimal" onChange={(event) => updateForm("value", event.target.value)} /></label></div>
        <label>Responsável (profissional)<input value={form.responsavel} onChange={(event) => updateForm("responsavel", event.target.value)} placeholder="Nome de quem vai fazer" /></label>
        {Object.keys(porProfissional).length > 0 && <div className="capacidade-profissionais">
          <p className="kicker">Capacidade dos profissionais</p>
          {Object.entries(porProfissional).sort((a, b) => b[1].length - a[1].length).map(([nome, lista]) => { const aberto = profissionalAberto === nome; return <div className={`capacidade-item ${form.responsavel.trim() === nome ? "active" : ""}`} key={nome}>
            <button type="button" className="capacidade-item-head" onClick={() => { updateForm("responsavel", nome); setProfissionalAberto(aberto ? null : nome); }}>
              <span>{nome}</span><b>{lista.length} ativo{lista.length > 1 ? "s" : ""}</b><i>{aberto ? "▲" : "▼"}</i>

            {aberto && <div className="capacidade-item-corpo">{lista.map((s) => <div className="capacidade-servico" key={s.id}><strong>{s.clientes?.nome || "Cliente"}</strong><span>{s.titulo}</span><em>{statusLabel[s.status] || s.status}{s.prazo ? " · " + compactDate(s.prazo) : ""}</em></div>)}</div>}
          </div>; })}
        </div>}
        <label>Próxima ação*<input value={form.nextAction} onChange={(event) => updateForm("nextAction", event.target.value)} /></label>
        <label>Data da próxima ação*<input type="date" value={form.due} onChange={(event) => updateForm("due", event.target.value)} /></label>
        <label className="check"><input type="checkbox" checked={form.addAgenda} onChange={(event) => updateForm("addAgenda", event.target.checked)} />Também criar/atualizar compromisso na Agenda</label>
        {form.addAgenda && <div className="sub-form"><div className="row"><label>Tipo<select value={form.agendaType} onChange={(event) => updateForm("agendaType", event.target.value)}><option value="remoto">Remoto</option><option value="presencial">Presencial</option></select></label><label>Hora (opcional)<input type="time" value={form.time} onChange={(event) => updateForm("time", event.target.value)} /></label></div>{cityConflicts.length > 0 && <div className="danger-box">Conflito de cidade nesse dia: {cityConflicts.map((entry) => `${entry.hora} ${entry.cidade}`).join(" · ")}. Diego precisa revisar.</div>}</div>}
        <ReviewBox lines={[`Cliente: ${form.customerId ? "reutilizar ficha" : "procurar/criar"} ${form.name || "—"}`, `Serviço: ${form.service || "—"} · ${statusLabel[form.serviceStatus]}`, `Próxima ação: ${form.nextAction || "—"} · ${form.due || "sem data"}`, form.addAgenda ? `Agenda: ${form.agendaType} ${form.time || "horário automático"}` : "Agenda: não criar"]} />

// ROTINAS RECORRENTES: "a cada X dias". Sem ultima_execucao => vence hoje (nunca foi feita).
function somarDias(dataISO, dias) { const d = new Date(dataISO + "T12:00:00"); d.setDate(d.getDate() + dias); return d.toISOString().slice(0, 10); }
function proximaRotina(rotina) { return rotina.ultima_execucao ? somarDias(rotina.ultima_execucao, rotina.intervalo_dias) : null; }
function statusRotina(rotina, hoje) {
  const prox = proximaRotina(rotina);
  if (!prox) return { estado: "vencida", dias: 0, prox: hoje };
  const diff = Math.round((new Date(prox + "T12:00:00") - new Date(hoje + "T12:00:00")) / 86400000);
  return { estado: diff < 0 ? "vencida" : diff === 0 ? "hoje" : "futura", dias: diff, prox };
}
function textoRotina(st) {
  if (st.estado === "vencida") return st.dias === 0 ? "Nunca feita" : `Atrasada ${Math.abs(st.dias)} dia(s)`;
  if (st.estado === "hoje") return "Fazer hoje";
  return st.dias === 1 ? "Amanhã" : `Em ${st.dias} dias`;
}
function corCompromisso(data, hoje) { const amanha = new Date(hoje + "T12:00:00"); amanha.setDate(amanha.getDate() + 1); const amanhaISO = amanha.toISOString().slice(0, 10); return data <= hoje ? "alta" : data === amanhaISO ? "media" : "baixa"; }

// Presencial antes de remoto no mesmo dia, depois por hora.
function ordenarCompromisso(a, b) { return (a.data + (a.tipo === "remoto" ? "1" : "0") + (a.hora || "99")).localeCompare(b.data + (b.tipo === "remoto" ? "1" : "0") + (b.hora || "99")); }

function horaFalada(hora) {
  if (!hora) return "";
  const [h, m] = hora.slice(0, 5).split(":");
  return m === "00" ? `${parseInt(h, 10)} horas` : `${parseInt(h, 10)}h${m}`;
}
// "hoje"/"amanhã" soa mais natural numa mensagem pro cliente do que a data cheia.
function quandoFalado(data, hora, hoje) {
  const amanha = new Date(hoje + "T12:00:00"); amanha.setDate(amanha.getDate() + 1);
  const dia = data === hoje ? "hoje" : data === amanha.toISOString().slice(0, 10) ? "amanhã" : `no dia ${compactDate(data)}`;
  const horaTxt = horaFalada(hora);
  return ` ${dia}${horaTxt ? " às " + horaTxt : ""}`;
}
// Sempre gera uma mensagem pronta (mesmo sem sugestao_resposta salva) pra o botão do WhatsApp nunca abrir vazio.
function mensagemPadraoCompromisso(a, svc, hoje) {
  const nome = svc?.clientes?.nome ? svc.clientes.nome.split(" ")[0] : "";
  const oQueFazer = svc?.proxima_acao || a.titulo;
  const quando = a.tipo === "remoto" ? "" : quandoFalado(a.data, a.hora, hoje || hojeISO());
  return `Oi${nome ? " " + nome : ""}, tudo bem? Passando pra confirmar: ${oQueFazer}${quando}.`;
}

// Rotinas que vencem hoje ou estão atrasadas aparecem no Painel; "✓ Fiz hoje" reinicia a contagem.
function RotinasCard({ rotinas, hoje, db, demo, notify, onChanged }) {
  const [busyId, setBusyId] = useState(null);
  const pendentes = rotinas.map((r) => ({ r, st: statusRotina(r, hoje) })).filter((x) => x.st.estado !== "futura")
    .sort((a, b) => a.st.dias - b.st.dias);
  if (!pendentes.length) return null;
  const marcarFeita = async (rotina) => {
    if (demo) { notify("Na demonstração a rotina não é salva.", "info"); return; }
    setBusyId(rotina.id);
    try {
      const { error } = await db.from("rotinas").update({ ultima_execucao: hoje }).eq("id", rotina.id);
      if (error) throw error;
      notify(`"${rotina.titulo}" marcada como feita hoje.`, "ok"); onChanged();
    } catch (e) { notify("Erro: " + e.message, "error"); } finally { setBusyId(null); }
  };
  return <section className="content-card">
    <div className="card-head"><div><p className="kicker">ROTINAS RECORRENTES</p><h3>{pendentes.length} rotina(s) pra hoje</h3></div></div>
    <div className="rotina-lista">{pendentes.map(({ r, st }) => <article className={`rotina-item ${st.estado === "vencida" ? "cor-alta" : "cor-media"}`} key={r.id}>
      <div className="rotina-esq">
        <strong>{r.titulo}</strong>
        <span>a cada {r.intervalo_dias} dia(s){r.hora ? ` · ${horaFalada(r.hora)}` : ""}{r.observacao ? ` · ${r.observacao}` : ""}</span>
      </div>
      <div className="rotina-dir">
        <em className={st.estado === "vencida" ? "atrasada" : ""}>{textoRotina(st)}</em>
        <button className="ghost" disabled={busyId === r.id} onClick={() => marcarFeita(r)}>{busyId === r.id ? "..." : "✓ Fiz hoje"}</button>
      </div>
    </article>)}</div>
  </section>;
}

const SEM_PROFISSIONAL = "Sem profissional atribuído";
// PAINEL: capacidade por profissional - clica no nome pra ver os servicos dele (mesmo padrao da Agenda: colapsado, expande no clique)
function CapacidadeCard({ services }) {
  const [aberto, setAberto] = useState(null);
  const porProfissional = useMemo(() => {
    const map = {};
    // Capacidade é só trabalho FECHADO que ocupa alguém: agendado e produção. Lead e orçamento são funil
    // comercial - ninguém está trabalhando neles, e contá-los inflava o card (52 itens onde havia 1 real).
    // Sem responsável entra num grupo próprio: é carga de verdade sem dono definido, não pode sumir do radar.
    (services || []).forEach((s) => { if (["agendado", "producao"].includes(s.status)) { const k = s.responsavel?.trim() || SEM_PROFISSIONAL; (map[k] ||= []).push(s); } });
    return map;
  }, [services]);
  // "Sem profissional" fica sempre por último, mesmo sendo o maior grupo - é pendência, não capacidade.
  const nomes = Object.entries(porProfissional).sort((a, b) => (a[0] === SEM_PROFISSIONAL) - (b[0] === SEM_PROFISSIONAL) || b[1].length - a[1].length);
  if (!nomes.length) return null;
  return <section className="content-card">
    <div className="card-head"><div><p className="kicker">CAPACIDADE</p><h3>Profissionais em serviço</h3></div></div>
    <div className="capacidade-profissionais">{nomes.map(([nome, lista]) => { const isAberto = aberto === nome; return <div className={`capacidade-item${isAberto ? " active" : ""}`} key={nome}>
      <button type="button" className="capacidade-item-head" onClick={() => setAberto(isAberto ? null : nome)}>
        <span>{nome === SEM_PROFISSIONAL ? "⚠ " + nome : nome}</span><b>{lista.length} ativo{lista.length > 1 ? "s" : ""}</b><i>{isAberto ? "▲" : "▼"}</i>
      </button>
      {isAberto && <div className="capacidade-item-corpo">{lista.map((s) => <div className="capacidade-servico" key={s.id}><strong>{s.clientes?.nome || "Cliente"}</strong><span>{s.titulo}</span><em>{statusLabel[s.status] || s.status}{s.prazo ? " · " + compactDate(s.prazo) : ""}</em></div>)}</div>}
    </div>; })}</div>
  </section>;
}

// Colapsado: só o essencial pra bater o olho (dia + rota). Clica pra abrir os compromissos do dia.
function AgendaView({ appointments, services, finances, onReschedule, onConcluir, onAdd }) {
  const [diaAberto, setDiaAberto] = useState(null);
  const hoje = hojeISO();
  const groups = appointments.reduce((acc, item) => { (acc[item.data] ||= []).push(item); return acc; }, {});

    <div className="card-head"><div><p className="kicker">ROTINA E DESLOCAMENTO</p><h3>Agenda planejada</h3></div><button className="primary" onClick={onAdd}>+ Adicionar</button></div>

    <div className="agenda-dias">{dias.map((date) => {
      const items = groups[date];
      const cor = corCompromisso(date, hoje);
      const presenciais = items.filter((a) => (a.tipo || "presencial") === "presencial" && a.cidade);
      const cidadesUnicas = [...new Map(presenciais.map((a) => [cidadeChave(a.cidade), a.cidade])).values()];

      return <div className={`agenda-dia-card cor-${cor}`} key={date}>
        <button className="agenda-dia-head" onClick={() => setDiaAberto(aberto ? null : date)}>
          <div className="agenda-dia-data"><b>{numero}</b><span>{semana}</span><em>{mes}</em></div>

            {cidadesUnicas.map((c) => <span className="badge-cidade" key={c}>⌖ {c}</span>)}

}
