  const submit = () => {
    if (!form.titulo.trim()) { notify("Descreva o compromisso.", "error"); return; }
    if (form.tipo === "presencial" && !form.cidade.trim()) { notify("Compromisso presencial precisa de cidade.", "error"); return; }
    setPickerOpen(true);
  };
  const onPicked = async (dataISO, hora) => {
    setPickerOpen(false);
    if (demo) { notify("Na demonstração a agenda não é salva.", "info"); onClose(); return; }
    setBusy(true);
    try {
      const { error } = await db.from("agenda").insert({ titulo: form.titulo.trim(), data: dataISO, hora, cidade: form.tipo === "presencial" ? form.cidade.trim() : null, tipo: form.tipo, status: "planejado" });
      if (error) throw error;
      notify("Compromisso adicionado.", "ok"); onDone();
    } catch (e) { notify("Erro: " + e.message, "error"); } finally { setBusy(false); }
  };
  const apptDesc = { titulo: form.titulo.trim() || "Novo compromisso", tipo: form.tipo, cidade: form.tipo === "presencial" ? form.cidade.trim() : null };
  return <>
    <div className="modal-overlay" onMouseDown={(e) => { if (e.target === e.currentTarget) onClose(); }}><div className="modal-card small">
      <div className="modal-head"><div><p className="kicker">NOVO COMPROMISSO</p><h2>Adicionar</h2></div><button className="ghost" onClick={onClose}>Fechar</button></div>
      <div className="form-grid">
        <label>Compromisso*<input value={form.titulo} onChange={(e) => setForm((f) => ({ ...f, titulo: e.target.value }))} /></label>
        <div className="row"><label>Tipo<select value={form.tipo} onChange={(e) => setForm((f) => ({ ...f, tipo: e.target.value }))}><option value="presencial">Presencial</option><option value="remoto">Remoto</option></select></label><label>Cidade{form.tipo === "presencial" ? "*" : ""}<input value={form.cidade} onChange={(e) => setForm((f) => ({ ...f, cidade: e.target.value }))} disabled={form.tipo === "remoto"} /></label></div>
        <button className="primary wide" onClick={submit} disabled={busy}>Escolher dia e horário</button>
      </div>
    </div></div>
    {pickerOpen && <AgendaPicker appointments={appointments} appt={apptDesc} onClose={() => setPickerOpen(false)} onPicked={onPicked} />}
  </>;
}

function ConcluirModal({ db, demo, notify, appt, onClose, onDone }) {
  const [step, setStep] = useState("choose");
  const [pendente, setPendente] = useState("");
  const [files, setFiles] = useState([]);
  const [busy, setBusy] = useState(false);
  const openParcial = () => { setPendente(sugerirPendente(appt.titulo)); setStep("parcial"); };
  const uploadFiles = async () => {
    const uploaded = [];
    for (const f of files) {
      const path = `caixa-entrada/${Date.now()}_${f.name.replace(/[^a-zA-Z0-9._-]/g, "_")}`;
      const { error: uploadError } = await db.storage.from("fotos-servicos").upload(path, f); if (uploadError) throw uploadError;
      const { data, error } = await db.storage.from("fotos-servicos").createSignedUrl(path, 60 * 60 * 24 * 365); if (error) throw error;
      uploaded.push({ url: data.signedUrl, fileName: f.name });
    }
    return uploaded;
  };
  const doTotal = async () => {
    if (demo) { notify("Concluído (demo).", "ok"); onDone({ agendaId: appt.id, servicoId: appt.servico_id || null, proximaAcao: null }); return; }
    setBusy(true);
    try {
      const { error } = await db.from("agenda").update({ status: "feito" }).eq("id", appt.id); if (error) throw error;
      if (appt.servico_id) {
        const { error: sErr } = await db.from("servicos").update({ proxima_acao: null, atualizado_em: new Date().toISOString() }).eq("id", appt.servico_id); if (sErr) throw sErr;
        await db.from("historico").insert({ o_que: `"${appt.titulo}" concluído`, por: "diego" });
      }
      if (files.length) {
        const uploaded = await uploadFiles();
        const nota = `Concluído: "${appt.titulo}"${appt.cidade ? " · " + appt.cidade : ""}. Print(s) anexado(s) pro Claude ver e atualizar a ficha/foto.${appt.servico_id ? " (serviço #" + appt.servico_id + ")" : ""}`;
        const { error: cxErr } = await db.from("caixa_entrada").insert({ texto: buildInboxPayload(uploaded, nota), status: "novo", conversa: [], processado: false }); if (cxErr) throw cxErr;
      }
      notify("Concluído.", "ok"); onDone({ agendaId: appt.id, servicoId: appt.servico_id || null, proximaAcao: null });
    } catch (e) { notify("Erro: " + e.message, "error"); } finally { setBusy(false); }
  };
  const doParcial = async () => {
    if (!pendente.trim()) { notify("Explique o que ficou pendente.", "error"); return; }
    if (demo) { notify("Anotado (demo).", "ok"); onDone({ agendaId: appt.id, servicoId: appt.servico_id || null, proximaAcao: pendente.trim() }); return; }
    setBusy(true);
    try {
      const nota = `Reagendar (parcial): "${appt.titulo}"${appt.cidade ? " · " + appt.cidade : ""}${appt.tipo === "remoto" ? " · remoto" : ""}. Ficou pendente: ${pendente.trim()}.${appt.servico_id ? " (serviço #" + appt.servico_id + ")" : ""}`;
      const uploaded = files.length ? await uploadFiles() : [];
      const { error: cxErr } = await db.from("caixa_entrada").insert({ texto: buildInboxPayload(uploaded, nota), status: "novo", conversa: [], processado: false }); if (cxErr) throw cxErr;
      const { error } = await db.from("agenda").update({ status: "feito" }).eq("id", appt.id); if (error) throw error;
      if (appt.servico_id) { const { error: sErr } = await db.from("servicos").update({ proxima_acao: pendente.trim(), atualizado_em: new Date().toISOString() }).eq("id", appt.servico_id); if (sErr) throw sErr; }
      await db.from("historico").insert({ o_que: `"${appt.titulo}": parcial — Claude vai reagendar`, por: "diego", detalhe: "Pendente: " + pendente.trim() });
      notify("Anotado. O Claude reagenda na próxima vez que você chamar.", "ok"); onDone({ agendaId: appt.id, servicoId: appt.servico_id || null, proximaAcao: pendente.trim() });
    } catch (e) { notify("Erro: " + e.message, "error"); } finally { setBusy(false); }
  };
  const filePicker = <div className="composer-actions"><label className="file-button">{files.length ? `${files.length} print(s)` : "Anexar print(s) (opcional)"}<input type="file" accept="image/*" multiple onChange={(e) => setFiles((fs) => [...fs, ...Array.from(e.target.files || [])])} /></label></div>;
  return <div className="modal-overlay" onMouseDown={(e) => { if (e.target === e.currentTarget) onClose(); }}>
    <div className="modal-card small">
      <div className="modal-head"><div><p className="kicker">CONCLUIR COMPROMISSO</p><h2>{appt.titulo}</h2></div><button className="ghost" onClick={onClose}>Fechar</button></div>
      {step === "choose" ? <div className="concluir-opcoes">
        <p className="modal-intro">Foi concluído totalmente ou ficou pendência?</p>
        {files.length > 0 && <div className="composer-files">{files.map((f, i) => <span key={i} className="composer-file-chip">{f.name}<button type="button" onClick={() => setFiles((fs) => fs.filter((_, idx) => idx !== i))}>✕</button></span>)}</div>}
        {filePicker}
        <button className="primary wide" onClick={doTotal} disabled={busy}>✔ Concluído total — acabou</button>
        <button className="secondary wide" onClick={openParcial} disabled={busy}>🟡 Parcial — falta algo, o Claude reagenda</button>
      </div> : <div className="form-grid">
        <label>Explique o que ficou pendente<textarea value={pendente} onChange={(e) => setPendente(e.target.value)} /></label>
        {files.length > 0 && <div className="composer-files">{files.map((f, i) => <span key={i} className="composer-file-chip">{f.name}<button type="button" onClick={() => setFiles((fs) => fs.filter((_, idx) => idx !== i))}>✕</button></span>)}</div>}
        {filePicker}
        <p className="ficha-note">Você só explica o que faltou — o Claude reagenda na próxima vez que você chamar. Não precisa escolher data agora.</p>
        <div className="ficha-actions"><button className="primary" onClick={doParcial} disabled={busy}>Registrar pro Claude</button><button className="ghost" onClick={() => setStep("choose")}>Voltar</button></div>
      </div>}
    </div>
  </div>;
}

function ExplicarModal({ db, demo, notify, item, kind, onClose, onDone }) {
  const ehReagendar = kind === "reagendar";
  const [texto, setTexto] = useState(ehReagendar ? sugerirPendente(item.titulo) : "");
  const [files, setFiles] = useState([]);
  const [busy, setBusy] = useState(false);
  const submit = async () => {
    if (!texto.trim()) { notify("Escreva uma explicação pro Claude.", "error"); return; }
    const alvoServicoDemo = item.tipoItem === "agenda" ? item.servico_id : item.id;
    if (demo) { notify("Anotado (demo).", "ok"); onDone({ agendaId: (item.tipoItem === "agenda" && ehReagendar) ? item.id : null, servicoId: alvoServicoDemo || null, proximaAcao: null }); return; }
    setBusy(true);
    try {
      const ref = item.tipoItem === "agenda" ? `(agenda #${item.id}${item.servico_id ? ", serviço #" + item.servico_id : ""})` : `(serviço #${item.id})`;
      const cabec = ehReagendar ? "Reagendar" : "Concluir lead";
      const ctx = `${item.cliente ? item.cliente + " · " : ""}${item.titulo}${item.cidade ? " · " + item.cidade : ""}${item.tipo === "remoto" ? " · remoto" : ""}`;
      const nota = `${cabec}: ${ctx}. ${ehReagendar ? "Explicação" : "O que aconteceu"}: ${texto.trim()}. ${ref}`;
      const uploaded = [];
      for (const f of files) {
        const path = `caixa-entrada/${Date.now()}_${f.name.replace(/[^a-zA-Z0-9._-]/g, "_")}`;
        const { error: uploadError } = await db.storage.from("fotos-servicos").upload(path, f); if (uploadError) throw uploadError;
        const { data, error } = await db.storage.from("fotos-servicos").createSignedUrl(path, 60 * 60 * 24 * 365); if (error) throw error;
        uploaded.push({ url: data.signedUrl, fileName: f.name });
      }
      const { error: cxErr } = await db.from("caixa_entrada").insert({ texto: buildInboxPayload(uploaded, nota), status: "novo", conversa: [], processado: false }); if (cxErr) throw cxErr;
      if (item.tipoItem === "agenda" && ehReagendar) { const { error } = await db.from("agenda").update({ status: "feito" }).eq("id", item.id); if (error) throw error; }
      const alvoServico = item.tipoItem === "agenda" ? item.servico_id : item.id;
      if (alvoServico) { const { error: sErr } = await db.from("servicos").update({ proxima_acao: null, atualizado_em: new Date().toISOString() }).eq("id", alvoServico); if (sErr) throw sErr; }
      await db.from("historico").insert({ o_que: `${cabec}: ${item.titulo}`, por: "diego", detalhe: texto.trim() });
      notify("Anotado. Saiu da lista — o Claude cuida disso quando você chamar.", "ok"); onDone({ agendaId: (item.tipoItem === "agenda" && ehReagendar) ? item.id : null, servicoId: alvoServico || null, proximaAcao: null });
    } catch (e) { notify("Erro: " + e.message, "error"); } finally { setBusy(false); }
  };
  return <div className="modal-overlay" onMouseDown={(e) => { if (e.target === e.currentTarget) onClose(); }}>
    <div className="modal-card small">
      <div className="modal-head"><div><p className="kicker">{ehReagendar ? "REAGENDAR" : "CONCLUIR"}</p><h2>{item.titulo}</h2></div><button className="ghost" onClick={onClose}>Fechar</button></div>
      <div className="form-grid">
        <label>{ehReagendar ? "O que explicar pro Claude?" : "O que foi feito / o que o Claude deve fazer?"}<textarea value={texto} onChange={(e) => setTexto(e.target.value)} /></label>
        {files.length > 0 && <div className="composer-files">{files.map((f, i) => <span key={i} className="composer-file-chip">{f.name}<button type="button" onClick={() => setFiles((fs) => fs.filter((_, idx) => idx !== i))}>✕</button></span>)}</div>}
        <div className="composer-actions"><label className="file-button">{files.length ? `${files.length} print(s)` : "Anexar print(s) (opcional)"}<input type="file" accept="image/*" multiple onChange={(e) => setFiles((fs) => [...fs, ...Array.from(e.target.files || [])])} /></label></div>
        <p className="ficha-note">{ehReagendar ? "Você só explica — o Claude abre o calendário e reagenda na próxima vez que você chamar. Não precisa escolher a data agora." : "Você explica o que rolou — o Claude atualiza o lead (status, próximo passo) na próxima vez que você chamar."}</p>
        <div className="ficha-actions"><button className="primary" onClick={submit} disabled={busy}>Registrar pro Claude</button><button className="ghost" onClick={onClose}>Cancelar</button></div>
      </div>
    </div>
  </div>;
}

function AgendaPicker({ appointments, appt, onClose, onPicked }) {
  const tipo = appt.tipo || "presencial";
  const cidade = tipo === "presencial" ? (appt.cidade || "") : null;
  const hoje = new Date();
  const porDia = {};
  appointments.forEach((a) => { if (a.id && a.id === appt.id) return; (porDia[a.data] = porDia[a.data] || []).push(a); });
  const dias = [];
  for (let i = 0; i < 14; i++) {
    const d = new Date(hoje); d.setDate(d.getDate() + i);
    const dataISO = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
    const doDia = porDia[dataISO] || [];
    const ocupados = tipo === "presencial" ? doDia.filter((a) => (a.tipo || "presencial") === "presencial" && cidadeChave(a.cidade) === cidadeChave(cidade)).map((a) => a.hora) : [];
    const livres = horariosParaTipo(dataISO, tipo, ocupados);
    if (!livres.length) continue;
    const cidadesDoDia = [...new Set(doDia.filter((a) => (a.tipo || "presencial") === "presencial" && a.cidade).map((a) => a.cidade))];
    const outrasCidades = tipo === "presencial" && cidade ? doDia.filter((a) => (a.tipo || "presencial") === "presencial" && a.cidade && a.hora && cidadeChave(a.cidade) !== cidadeChave(cidade)) : [];
    dias.push({ dataISO, doDia, livres, cidadesDoDia, outrasCidades, conflito: outrasCidades.length > 0 });
  }
  return <div className="modal-overlay" onMouseDown={(e) => { if (e.target === e.currentTarget) onClose(); }}>
    <div className="modal-card small">
      <div className="modal-head"><div><p className="kicker">ESCOLHER DIA E HORÁRIO</p><h2>{appt.titulo || "Compromisso"}</h2></div><button className="ghost" onClick={onClose}>Fechar</button></div>
      <p className="modal-intro">{tipo === "remoto" ? "Tarefa remota — qualquer horário das 07h às 22h." : `Presencial${cidade ? " em " + cidade : ""} — respeitando sua rotina da semana.`}</p>
      {!dias.length ? <div className="empty-state"><b>Sem horário livre nos próximos 14 dias.</b></div> : dias.map((dia) => <div className="picker-day" key={dia.dataISO}>
        <div className={`picker-day-label${dia.conflito ? " conflito" : ""}`}>{compactDate(dia.dataISO)}{dia.doDia.length ? ` · ${dia.doDia.length} compromisso(s)` : " · dia livre"}{dia.cidadesDoDia.length ? ` · 🏙 ${dia.cidadesDoDia.join(", ")}` : ""}</div>
        {dia.conflito && <div className="picker-aviso">⚠️ Já tem {dia.outrasCidades.map((a) => `${(a.hora || "").slice(0, 5)} em ${a.cidade}`).join(", ")} — horários em vermelho não dão tempo de serviço + estrada.</div>}
        <div className="picker-slots">{dia.livres.map((h) => { const risky = horarioApertado(h, dia.outrasCidades, cidade); return <button key={h} className={`picker-slot${risky ? " risky" : ""}`} title={risky ? "Muito perto do compromisso em outra cidade — serviço + estrada não fecha." : ""} onClick={() => onPicked(dia.dataISO, h)}>{h}</button>; })}</div>
      </div>)}
    </div>
  </div>;
}

const FINANCE_ABAS = [{ id: "todos", label: "Todos" }, { id: "empresa", label: "Empresa" }, { id: "pro_labore", label: "Pró-labore" }, { id: "pessoal", label: "Pessoal" }];
function FinanceView({ finances, onVerAPagar }) {
  const [aba, setAba] = useState("todos");
  // O Financeiro mostra o que JÁ ACONTECEU. Conta futura (a_pagar) fica de fora da lista porque ela ordena por
  // data: um parcelamento de 12 meses ia empilhar 2027 em cima do que aconteceu hoje e esconder o dia. O que
  // está por vencer aparece resumido na faixa do topo, que leva pra aba "A pagar".
  const realizados = finances.filter((item) => item.status !== "a_pagar");
  const visiveis = aba === "todos" ? realizados
    : aba === "pro_labore" ? realizados.filter((item) => item.categoria === "Pró-labore" && item.tipo === "entrada")
    : realizados.filter((item) => (item.escopo || "empresa") === aba);
  const hoje = hojeISO();
  const limite = somaDiaMes(hoje, 1);
  const vencendo = finances.filter((item) => item.status === "a_pagar" && item.tipo === "saida" && (item.data || "") <= limite);
  const totalVencendo = vencendo.reduce((s, item) => s + Number(item.valor), 0);
  const atrasadas = vencendo.filter((item) => (item.data || "") < hoje);
  const paidIn = visiveis.filter((item) => item.tipo === "entrada" && (!item.status || item.status === "pago")).reduce((sum, item) => sum + Number(item.valor), 0); const paidOut = visiveis.filter((item) => item.tipo === "saida" && (!item.status || item.status === "pago")).reduce((sum, item) => sum + Number(item.valor), 0);
  return <div className="page-grid"><div className="funil-filtros">{FINANCE_ABAS.map((a) => <button key={a.id} className={aba === a.id ? "active" : ""} onClick={() => setAba(a.id)}>{a.label}</button>)}</div>
    {vencendo.length > 0 && <section className="warning-card"><b>{money(totalVencendo)} a vencer até {compactDate(limite)}</b>
      <span>{vencendo.length} conta(s){atrasadas.length ? ` · ${atrasadas.length} já vencida(s)` : ""} — ainda não saíram do caixa. {onVerAPagar && <button type="button" className="ficha-link" onClick={onVerAPagar}>ver em A pagar</button>}</span>
    </section>}
    <section className="metric-grid finance-metrics"><Metric label="Entradas" value={money(paidIn)} detail="Confirmadas" tone="green" /><Metric label="Saídas" value={money(paidOut)} detail="Confirmadas" tone="red" /><Metric label="Saldo" value={money(paidIn - paidOut)} detail="Visão operacional" tone="orange" /></section><section className="content-card"><div className="card-head"><div><p className="kicker">SOMENTE LEITURA NO MODO CLAUDE</p><h3>Lançamentos realizados</h3></div></div>{visiveis.map((item) => <div className="finance-row" key={item.id}><div><strong>{item.descricao || item.categoria || "Lançamento"}</strong><span>{compactDate(item.data)} · {item.status || "pago"}</span></div><b className={item.tipo}>{item.tipo === "saida" ? "−" : "+"} {money(item.valor)}</b></div>)}{!visiveis.length && <div className="empty-state"><b>Nada por aqui ainda.</b></div>}</section></div>;
}

function nomeFornecedorVale(descricao) {
  const semPrefixo = (descricao || "").replace(/^Vale\s*-\s*/i, "");
  return semPrefixo.split(/[\(,]/)[0].trim() || "Sem nome";
}
const VALE_ABATIDO_TAG = "[ABATIDO] ";
function ValesView({ finances, db, demo, notify, onChanged }) {
  const [busyId, setBusyId] = useState(null);
  const vales = finances.filter((f) => f.categoria === "Vale");
  // Vale é lembrete de dívida, NÃO gasto: enquanto pendente fica status "a_pagar" e por isso não entra no saldo do
  // Financeiro (que só soma pago). Ao marcar abatido - o momento em que o Diego realmente paga - vira "pago" e aí sim
  // pesa no caixa. O prefixo [ABATIDO] na descrição é só a marcação administrativa que move o item pro histórico.
  const pendentes = vales.filter((v) => !(v.descricao || "").startsWith(VALE_ABATIDO_TAG));
  const abatidos = vales.filter((v) => (v.descricao || "").startsWith(VALE_ABATIDO_TAG));
  const porFornecedor = {};
  pendentes.forEach((v) => { const nome = nomeFornecedorVale(v.descricao); (porFornecedor[nome] ||= []).push(v); });
  const totalPendente = pendentes.reduce((sum, v) => sum + Number(v.valor), 0);
  const marcarAbatido = async (item) => {
    if (demo) { notify("Na demonstração não salva.", "info"); return; }
    setBusyId(item.id);
    try {
      const { error } = await db.from("financeiro").update({ descricao: VALE_ABATIDO_TAG + item.descricao, status: "pago" }).eq("id", item.id); if (error) throw error;
      notify("Vale abatido — agora conta como saída no caixa.", "ok"); await onChanged();
    } catch (e) { notify("Erro: " + e.message, "error"); } finally { setBusyId(null); }
  };
  return <div className="page-grid">
    <section className="metric-grid finance-metrics"><Metric label="Vales pendentes" value={money(totalPendente)} detail={`${pendentes.length} lançamento(s)`} tone="red" /><Metric label="Fornecedores com vale" value={String(Object.keys(porFornecedor).length)} detail="Aguardando abater" tone="orange" /><Metric label="Já abatidos" value={String(abatidos.length)} detail="Histórico" tone="green" /></section>
    <section className="content-card"><div className="card-head"><div><p className="kicker">CONTROLE DE VALES</p><h3>Pendentes de abater</h3></div></div>
      {!pendentes.length && <div className="empty-state"><b>Nenhum vale pendente.</b><span>Quando você der um vale a um profissional, ele aparece aqui até marcar como abatido.</span></div>}
      {Object.entries(porFornecedor).map(([nome, itens]) => { const subtotal = itens.reduce((s, v) => s + Number(v.valor), 0); return <div key={nome} className="vale-fornecedor">
        <div className="vale-fornecedor-head"><strong>{nome}</strong><b>{money(subtotal)}</b></div>
        {itens.map((v) => <div className="finance-row" key={v.id}><div><strong>{compactDate(v.data)}</strong><span>{v.descricao}</span></div><div className="agenda-acoes"><b className="saida">− {money(v.valor)}</b><button className="ghost" disabled={busyId === v.id} onClick={() => marcarAbatido(v)}>{busyId === v.id ? "..." : "Marcar abatido"}</button></div></div>)}
      </div>; })}
    </section>
    {abatidos.length > 0 && <section className="content-card"><div className="card-head"><div><p className="kicker">HISTÓRICO</p><h3>Vales já abatidos</h3></div></div>{abatidos.map((v) => <div className="finance-row" key={v.id}><div><strong>{v.descricao.replace(VALE_ABATIDO_TAG, "")}</strong><span>{compactDate(v.data)} · abatido</span></div><b className="saida">− {money(v.valor)}</b></div>)}</section>}
  </div>;
}

// Compra de material NÃO é uma tabela separada: é um lançamento normal do financeiro (categoria "Material", escopo empresa)
// com fornecedor_id e, quando o material foi pra um trabalho específico, servico_id. Assim o saldo da empresa nunca
// desencontra e a aba Compras é só uma VISTA - mesmo padrão de Vales e Pró-labore. Ver REGRA Nº 8 no Guia da IA.
const CATEGORIA_MATERIAL = "Material";
function ehCompraMaterial(item) { return item.tipo === "saida" && (item.categoria === CATEGORIA_MATERIAL || !!item.fornecedor_id); }
// Compra antiga entrou sem fornecedor e fica pedindo atenção. "Conferido" é só a marca de que o Diego já olhou
// e está certo - nunca apaga o lançamento (Regra Nº 7), só tira do que precisa de revisão.
const COMPRA_CONFERIDA_TAG = "[CONFERIDO] ";
// COMO O MATERIAL VIRA COMPROMISSO. Fornecedor com dias de entrega cadastrados ENTREGA, então o que o Diego
// precisa fazer é PEDIR — vira compromisso remoto, um dia antes da entrega (é o "pedido 1 dia antes" que já
// está na observação dos fornecedores). Fornecedor sem dia fixo não entrega: aí é viagem presencial e precisa
// de cidade e hora, senão quebra a Regra Nº 4. Ver [[feedback-operacao-drive-direto-sem-caixa]].
function materiaisDoCompromisso(finances, agendaId) { return (finances || []).filter((f) => f.agenda_id === agendaId && f.status === "a_pagar" && ehCompraMaterial(f)); }
function planoDeCompra(fornecedor) {
  if (!fornecedor) return null;
  const entrega = proximaEntregaFornecedor(fornecedor.dias_entrega);
  if (entrega) {
    const d = new Date(entrega + "T12:00:00"); d.setDate(d.getDate() - 1);
    const pedirEm = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
    return { tipo: "remoto", data: pedirEm < hojeISO() ? hojeISO() : pedirEm, hora: null, entrega, rotulo: `Fazer o pedido na ${fornecedor.nome} (entrega ${compactDate(entrega)})` };
  }
  return { tipo: "presencial", data: hojeISO(), hora: "08:00", entrega: null, rotulo: `Buscar material na ${fornecedor.nome}` };
}
function compraPrecisaRevisao(item) { return !item.fornecedor_id && !(item.descricao || "").startsWith(COMPRA_CONFERIDA_TAG); }
function mesISO(data) { return (data || "").slice(0, 7); }
function mesLabel(chave) {
  if (!chave) return "Sem data";
  const d = new Date(`${chave}-01T12:00:00`);
  return Number.isNaN(d.getTime()) ? chave : d.toLocaleDateString("pt-BR", { month: "long", year: "numeric" });
}
const COMPRAS_ABAS = [{ id: "mes", label: "Por mês" }, { id: "fornecedor", label: "Por fornecedor" }, { id: "servico", label: "Por serviço" }];

function ComprasView({ finances, fornecedores, services, appointments, db, demo, mode, notify, onChanged }) {
  const [aba, setAba] = useState("mes");
  const [formOpen, setFormOpen] = useState(false);
  const [busy, setBusy] = useState(false);
  const vazio = { fornecedorId: "", servicoId: "", valor: "", descricao: "", data: hojeISO(), jaComprei: true };
  const [draft, setDraft] = useState(vazio);
  const [confirmando, setConfirmando] = useState(null); // { id, servicoId } - item da lista sendo marcado como comprado
  const [vinculando, setVinculando] = useState(null); // id do item escolhendo em qual viagem já marcada aproveitar
  const [cidadeDraft, setCidadeDraft] = useState(null); // { id, valor } - cidade do fornecedor perguntada na hora de agendar

  const todas = finances.filter(ehCompraMaterial);
  // "a comprar" é lista de compras (ainda não saiu dinheiro, status a_pagar); só o que já foi comprado conta como gasto.
  const aComprar = todas.filter((c) => c.status === "a_pagar");
  const compras = todas.filter((c) => c.status !== "a_pagar");
  const nomeFornecedor = (id) => fornecedores.find((f) => f.id === id)?.nome || "Sem fornecedor";
  const servicoDe = (id) => services.find((s) => s.id === id);
  const total = compras.reduce((soma, c) => soma + Number(c.valor), 0);
  const totalAComprar = aComprar.reduce((soma, c) => soma + Number(c.valor), 0);
  const mesAtual = mesISO(hojeISO());
  const totalMes = compras.filter((c) => mesISO(c.data) === mesAtual).reduce((soma, c) => soma + Number(c.valor), 0);

  const agrupar = (chaveDe) => {
    const grupos = {};
    compras.forEach((c) => { const k = chaveDe(c); (grupos[k] ||= []).push(c); });
    return grupos;
  };
  const grupos = aba === "mes" ? agrupar((c) => mesISO(c.data)) : aba === "fornecedor" ? agrupar((c) => nomeFornecedor(c.fornecedor_id)) : agrupar((c) => c.servico_id || "");
  const chaves = Object.keys(grupos).sort((a, b) => (aba === "mes" ? b.localeCompare(a) : a.localeCompare(b)));

  const labelServico = (id) => {
    if (!id) return "Sem serviço vinculado (estoque geral)";
    const s = servicoDe(id);
    return s ? `${s.clientes?.nome || "Cliente"} — ${s.titulo}` : "Serviço não encontrado";
  };
  const tituloGrupo = (chave) => aba === "mes" ? mesLabel(chave) : aba === "fornecedor" ? chave : labelServico(chave);

  const salvar = async () => {
    if (mode === "claude") { notify("Financeiro exige Diego.", "error"); return; }
    if (!draft.fornecedorId) { notify("Escolha o fornecedor.", "error"); return; }
    const valor = Number(String(draft.valor).replace(",", "."));
    if (!valor || valor <= 0) { notify("Informe um valor válido.", "error"); return; }
    if (demo) { notify("Na demonstração não salva.", "info"); return; }
    setBusy(true);
    try {
      const payload = {
        tipo: "saida", escopo: "empresa", categoria: CATEGORIA_MATERIAL, status: draft.jaComprei ? "pago" : "a_pagar",
        valor, data: draft.data || hojeISO(),
        descricao: draft.descricao.trim() || `Material — ${nomeFornecedor(draft.fornecedorId)}`,
        fornecedor_id: draft.fornecedorId, servico_id: draft.servicoId || null,
      };
      const { error } = await db.from("financeiro").insert(payload); if (error) throw error;
      notify(draft.jaComprei ? "Compra registrada." : "Item adicionado à lista de compras.", "ok"); setDraft(vazio); setFormOpen(false); await onChanged();
    } catch (e) { notify("Erro: " + e.message, "error"); } finally { setBusy(false); }
  };

  // Marcar como já comprado: vira gasto de verdade (status pago, data de hoje) e é a ÚLTIMA chance de dizer
  // pra qual serviço foi o material — muitas vezes na hora de anotar ele ainda não sabia.
  const marcarComprado = async (item) => {
    if (mode === "claude") { notify("Financeiro exige Diego.", "error"); return; }
    if (demo) { notify("Na demonstração não salva.", "info"); return; }
    setBusy(true);
    try {
      const patch = { status: "pago", data: hojeISO() };
      if (confirmando && confirmando.id === item.id && confirmando.servicoId) patch.servico_id = confirmando.servicoId;
      const { error } = await db.from("financeiro").update(patch).eq("id", item.id); if (error) throw error;
      notify("Marcado como comprado.", "ok"); setConfirmando(null); await onChanged();
    } catch (e) { notify("Erro: " + e.message, "error"); } finally { setBusy(false); }
  };

  // Material vira compromisso de dois jeitos, porque tem dia que ele faz a viagem só pra isso e tem dia que
  // aproveita uma ida que já estava marcada. Nos dois casos a compra guarda o agenda_id, então o compromisso
  // mostra o selo do material e a trava de rota passa a enxergar essa parada.
  const agendarCompra = async (item) => {
    if (mode === "claude") { notify("Agenda de material é do Diego.", "error"); return; }
    const forn = fornecedores.find((f) => f.id === item.fornecedor_id);
    if (!forn) { notify("Escolha o fornecedor antes de agendar.", "error"); return; }
    const plano = planoDeCompra(forn);
    // Presencial sem cidade quebra a Regra Nº 4 e cega a trava de rota. Em vez de mandar ele cadastrar noutro
    // lugar, pergunta aqui na hora e já guarda no fornecedor — não pergunta de novo nas próximas vezes.
    const cidadeInformada = cidadeDraft && cidadeDraft.id === item.id ? cidadeDraft.valor.trim() : "";
    if (plano.tipo === "presencial" && !forn.cidade && !cidadeInformada) {
      setCidadeDraft({ id: item.id, valor: "" });
      notify(`Em qual cidade fica a ${forn.nome}?`, "info");
      return;
    }
    if (demo) { notify("Na demonstração não salva.", "info"); return; }
    setBusy(true);
    try {
      if (cidadeInformada && !forn.cidade) { await db.from("fornecedores").update({ cidade: cidadeInformada }).eq("id", forn.id); forn.cidade = cidadeInformada; }
      const { data, error } = await db.from("agenda").insert({
        titulo: plano.rotulo, data: plano.data, hora: plano.hora, tipo: plano.tipo,
        cidade: plano.tipo === "presencial" ? forn.cidade : null, local: plano.tipo === "presencial" ? forn.cidade : null,
        status: "planejado",
      }).select("id").single();
      if (error) throw error;
      const { error: e2 } = await db.from("financeiro").update({ agenda_id: data.id }).eq("id", item.id); if (e2) throw e2;
      notify(plano.tipo === "remoto" ? `Pedido agendado para ${compactDate(plano.data)}.` : `Ida agendada para ${compactDate(plano.data)}.`, "ok");
      setCidadeDraft(null); await onChanged();
    } catch (e) { notify("Erro: " + e.message, "error"); } finally { setBusy(false); }
  };
  const pendurarNaViagem = async (item, agendaId) => {
    if (demo) { notify("Na demonstração não salva.", "info"); return; }
    setBusy(true);
    try {
      const { error } = await db.from("financeiro").update({ agenda_id: agendaId || null }).eq("id", item.id); if (error) throw error;
      notify(agendaId ? "Marcado no compromisso." : "Desvinculado.", "ok"); setVinculando(null); await onChanged();
    } catch (e) { notify("Erro: " + e.message, "error"); } finally { setBusy(false); }
  };
  const proximos = (appointments || []).filter((a) => a.status === "planejado" && a.data >= hojeISO()).sort((a, b) => (a.data + (a.hora || "")).localeCompare(b.data + (b.hora || "")));

  // Compra sem fornecedor (lançada antes desta aba existir): o Diego atribui o fornecedor ou marca conferida.
  const revisar = compras.filter(compraPrecisaRevisao);
  const resolverRevisao = async (item, fornecedorId) => {
    if (mode === "claude") { notify("Financeiro exige Diego.", "error"); return; }
    if (demo) { notify("Na demonstração não salva.", "info"); return; }
    setBusy(true);
    try {
      const patch = fornecedorId ? { fornecedor_id: fornecedorId } : { descricao: COMPRA_CONFERIDA_TAG + (item.descricao || "Material") };
      const { error } = await db.from("financeiro").update(patch).eq("id", item.id); if (error) throw error;
      notify(fornecedorId ? "Fornecedor vinculado." : "Conferida — sai da revisão.", "ok"); await onChanged();
    } catch (e) { notify("Erro: " + e.message, "error"); } finally { setBusy(false); }
  };

  const servicosVinculaveis = services.filter((s) => !["perdido"].includes(s.status));
  const seletorServico = (valor, onPick) => <select value={valor} onChange={(e) => onPick(e.target.value)}>
    <option value="">Estoque geral — sem serviço</option>
    {servicosVinculaveis.map((s) => <option key={s.id} value={s.id}>{(s.clientes?.nome || "Cliente") + " — " + s.titulo}</option>)}
  </select>;

  return <div className="page-grid">
    <section className="metric-grid finance-metrics">
      <Metric label="Material neste mês" value={money(totalMes)} detail={mesLabel(mesAtual)} tone="red" />
      <Metric label="A comprar" value={money(totalAComprar)} detail={`${aComprar.length} item(ns) na lista`} tone="orange" />
      <Metric label="Total em material" value={money(total)} detail={`${compras.length} compra(s)`} tone="green" />
    </section>

    {revisar.length > 0 && <section className="content-card">
      <div className="card-head"><div><p className="kicker">PRECISA DE REVISÃO</p><h3>{revisar.length} compra(s) sem fornecedor</h3></div></div>
      <p className="ficha-note">Lançamentos antigos, de antes desta aba existir. Diga de qual fornecedor foi — ou marque como conferida se já está certo. Nada é apagado.</p>
      {revisar.map((c) => <div className="finance-row" key={c.id}>
        <div><strong>{c.descricao || "Material"}</strong><span>{compactDate(c.data)} · {money(c.valor)}</span>
          <div className="fornecedor-chips">{fornecedores.map((f) => <button type="button" key={f.id} disabled={busy || mode === "claude"} onClick={() => resolverRevisao(c, f.id)}>{f.nome}</button>)}</div>
        </div>
        <div className="agenda-acoes"><button className="ghost" disabled={busy || mode === "claude"} onClick={() => resolverRevisao(c, null)}>✓ Conferida</button></div>
      </div>)}
    </section>}

    {aComprar.length > 0 && <section className="content-card">
      <div className="card-head"><div><p className="kicker">LISTA DE COMPRAS</p><h3>Ainda não comprado</h3></div></div>
      <p className="ficha-note">Enquanto está aqui não conta como gasto nem no Financeiro. Ao marcar como comprado vira saída da Empresa com a data de hoje.</p>
      {aComprar.map((c) => <div className="finance-row" key={c.id}>
        <div><strong>{c.descricao || "Material"}</strong><span>{nomeFornecedor(c.fornecedor_id)}{c.servico_id ? ` · ${labelServico(c.servico_id)}` : " · sem serviço vinculado"}</span>
          {(() => {
            const appt = (appointments || []).find((a) => a.id === c.agenda_id);
            if (appt) return <span>📅 {appt.titulo} · {compactDate(appt.data)}{appt.hora ? " " + appt.hora.slice(0, 5) : ""} <button type="button" className="ficha-link" onClick={() => pendurarNaViagem(c, null)}>desvincular</button></span>;
            return <span>Sem dia marcado — o pedido pode passar batido.</span>;
          })()}
          {confirmando && confirmando.id === c.id && !c.servico_id && <label className="material-edit-block">Foi pra qual serviço?{seletorServico(confirmando.servicoId, (v) => setConfirmando({ ...confirmando, servicoId: v }))}</label>}
          {cidadeDraft && cidadeDraft.id === c.id && <label className="material-edit-block">Em qual cidade fica a {nomeFornecedor(c.fornecedor_id)}?
            <input value={cidadeDraft.valor} autoFocus placeholder="Ex: Luziânia" onChange={(e) => setCidadeDraft({ id: c.id, valor: e.target.value })} onKeyDown={(e) => e.key === "Enter" && agendarCompra(c)} />
          </label>}
          {vinculando === c.id && <label className="material-edit-block">Aproveitar qual viagem?
            <select value="" onChange={(e) => e.target.value && pendurarNaViagem(c, e.target.value)}>
              <option value="">Escolha um compromisso já marcado…</option>
              {proximos.map((a) => <option key={a.id} value={a.id}>{compactDate(a.data)}{a.hora ? " " + a.hora.slice(0, 5) : ""} — {a.cidade || "remoto"} · {a.titulo}</option>)}
            </select>
          </label>}
        </div>
        <div className="agenda-acoes"><b className="saida">{money(c.valor)}</b>
          {!c.agenda_id && !confirmando && <>
            <button className="ghost" disabled={busy || mode === "claude"} onClick={() => agendarCompra(c)}>📅 Agendar ida</button>
            <button className="ghost" disabled={busy || mode === "claude"} onClick={() => setVinculando(vinculando === c.id ? null : c.id)}>🚗 Aproveitar viagem</button>
          </>}
          {confirmando && confirmando.id === c.id
            ? <><button className="primary" disabled={busy} onClick={() => marcarComprado(c)}>Confirmar compra</button><button className="ghost" onClick={() => setConfirmando(null)}>Cancelar</button></>
            : <button className="ghost" disabled={mode === "claude"} onClick={() => setConfirmando({ id: c.id, servicoId: c.servico_id || "" })}>✓ Já comprei</button>}
        </div>
      </div>)}
    </section>}

    <section className="content-card">
      <div className="card-head"><div><p className="kicker">COMPRAS DE MATERIAL</p><h3>Registrar nova compra</h3></div>
        <button className="ghost" onClick={() => setFormOpen(!formOpen)} disabled={mode === "claude"}>{formOpen ? "Cancelar" : mode === "claude" ? "Só o Diego lança" : "+ Nova compra"}</button></div>
      {formOpen && mode === "diego" && <div className="form-grid">
        <div className="classify">{[[true, "Já comprei"], [false, "Ainda vou comprar"]].map(([v, label]) => <button key={label} className={draft.jaComprei === v ? "active" : ""} onClick={() => setDraft({ ...draft, jaComprei: v })}>{label}</button>)}</div>
        <label>Fornecedor*
          <div className="fornecedor-chips">{fornecedores.map((f) => <button type="button" key={f.id} className={draft.fornecedorId === f.id ? "active" : ""} onClick={() => setDraft({ ...draft, fornecedorId: f.id })}>{f.nome}</button>)}</div>
        </label>
        <div className="row three">
          <label>Valor R$*<input value={draft.valor} onChange={(e) => setDraft({ ...draft, valor: e.target.value })} placeholder="0,00" /></label>
          <label>{draft.jaComprei ? "Data*" : "Precisa até*"}<input type="date" value={draft.data} onChange={(e) => setDraft({ ...draft, data: e.target.value })} /></label>
          <label>Serviço (opcional){seletorServico(draft.servicoId, (v) => setDraft({ ...draft, servicoId: v }))}</label>
        </div>
        <label>O que comprou<input value={draft.descricao} onChange={(e) => setDraft({ ...draft, descricao: e.target.value })} placeholder="Ex: 4m de linho Klee + espuma D33" /></label>
        <ReviewBox lines={[draft.jaComprei ? "Compra já feita — entra como saída da Empresa" : "Lista de compras — não entra no caixa até você confirmar", draft.fornecedorId ? nomeFornecedor(draft.fornecedorId) : "Sem fornecedor", `${money(String(draft.valor).replace(",", "."))} · ${draft.data || "sem data"}`, draft.servicoId ? labelServico(draft.servicoId) : "Estoque geral"]} />
        <button className="primary wide" onClick={salvar} disabled={busy}>{busy ? "Salvando…" : draft.jaComprei ? "Registrar compra" : "Adicionar à lista de compras"}</button>
      </div>}
      {!formOpen && <p className="ficha-note">Compra feita sai como saída da Empresa (categoria Material) — o saldo do Financeiro continua batendo. O que ainda vai comprar fica na lista sem mexer no caixa.</p>}
    </section>

    <div className="funil-filtros">{COMPRAS_ABAS.map((a) => <button key={a.id} className={aba === a.id ? "active" : ""} onClick={() => setAba(a.id)}>{a.label}</button>)}</div>

    <section className="content-card">
      <div className="card-head"><div><p className="kicker">{aba === "servico" ? "MARGEM REAL POR SERVIÇO" : "GASTO AGRUPADO"}</p><h3>{compras.length} compra(s)</h3></div></div>
      {!compras.length && <div className="empty-state"><b>Nenhuma compra de material registrada ainda.</b><span>Compras antigas lançadas soltas no Financeiro aparecem aqui depois de reclassificadas.</span></div>}
      {chaves.map((chave) => {
        const itens = grupos[chave];
        const subtotal = itens.reduce((s, c) => s + Number(c.valor), 0);
        const servico = aba === "servico" && chave ? servicoDe(chave) : null;
        const orcamento = Number(servico?.valor_orcamento || 0);
        return <div key={chave || "sem"} className="vale-fornecedor">
          <div className="vale-fornecedor-head"><strong>{tituloGrupo(chave)}</strong><b>{money(subtotal)}</b></div>
          {servico && orcamento > 0 && <div className="finance-row"><div><strong>Margem real</strong><span>Orçamento {money(orcamento)} − material {money(subtotal)}</span></div><b className={orcamento - subtotal >= 0 ? "entrada" : "saida"}>{money(orcamento - subtotal)}</b></div>}
          {itens.map((c) => <div className="finance-row" key={c.id}>
            <div><strong>{c.descricao || "Material"}</strong><span>{compactDate(c.data)}{aba !== "fornecedor" ? ` · ${nomeFornecedor(c.fornecedor_id)}` : ""}{aba !== "servico" && c.servico_id ? ` · ${labelServico(c.servico_id)}` : ""}</span></div>
            <b className="saida">− {money(c.valor)}</b>
          </div>)}
        </div>;
      })}
    </section>
  </div>;
}

// SAÍDAS FUTURAS: conta que já está comprometida mas ainda não saiu do caixa (parcela de cartão, aluguel).
// Fica com status "a_pagar", então o saldo do Financeiro NÃO se mexe até ser paga de verdade aqui.
// Vale tem aba própria e material a comprar aparece em Compras — por isso saem desta lista.
function ehSaidaFutura(item) { return item.tipo === "saida" && item.status === "a_pagar" && item.categoria !== "Vale" && item.categoria !== CATEGORIA_MATERIAL; }
function somaDiaMes(dataISO, meses) {
  const [a, m, d] = dataISO.split("-").map(Number);
  const base = new Date(a, m - 1 + meses, 1);
  const ultimo = new Date(base.getFullYear(), base.getMonth() + 1, 0).getDate();
  return `${base.getFullYear()}-${String(base.getMonth() + 1).padStart(2, "0")}-${String(Math.min(d, ultimo)).padStart(2, "0")}`;
}

function FuturoView({ finances, db, demo, mode, notify, onChanged }) {
  const [formOpen, setFormOpen] = useState(false);
  const [busy, setBusy] = useState(false);
  const vazio = { descricao: "", valor: "", parcelas: "1", primeiroVenc: somaDiaMes(hojeISO(), 1), escopo: "empresa", categoria: "Conta fixa" };
  const [draft, setDraft] = useState(vazio);

  const contas = finances.filter(ehSaidaFutura).slice().sort((a, b) => (a.data || "").localeCompare(b.data || ""));
  const hoje = hojeISO();
  const atrasadas = contas.filter((c) => (c.data || "") < hoje);
  const mesAtual = mesISO(hoje);
  const doMes = contas.filter((c) => mesISO(c.data) === mesAtual);
  const totalComprometido = contas.reduce((s, c) => s + Number(c.valor), 0);

  const porMes = {};
  contas.forEach((c) => { (porMes[mesISO(c.data)] ||= []).push(c); });
  const meses = Object.keys(porMes).sort();

  const pagar = async (item) => {
    if (mode === "claude") { notify("Financeiro exige Diego.", "error"); return; }
    if (demo) { notify("Na demonstração não salva.", "info"); return; }
    setBusy(true);
    try {
      const { error } = await db.from("financeiro").update({ status: "pago", data: hojeISO() }).eq("id", item.id); if (error) throw error;
      notify("Pago — agora entra no caixa.", "ok"); await onChanged();
    } catch (e) { notify("Erro: " + e.message, "error"); } finally { setBusy(false); }
  };

  const salvar = async () => {
    if (mode === "claude") { notify("Financeiro exige Diego.", "error"); return; }
    const total = Number(String(draft.valor).replace(",", "."));
    const n = Math.max(1, parseInt(draft.parcelas, 10) || 1);
    if (!draft.descricao.trim()) { notify("Descreva a conta.", "error"); return; }
    if (!total || total <= 0) { notify("Informe um valor válido.", "error"); return; }
    if (demo) { notify("Na demonstração não salva.", "info"); return; }
    setBusy(true);
    try {
      // Parcela vira um lançamento por vencimento: é o que faz o mês seguinte já mostrar o que vai pesar.
      const valorParcela = Math.round((total / n) * 100) / 100;
      const linhas = Array.from({ length: n }, (_, i) => ({
        tipo: "saida", escopo: draft.escopo, categoria: draft.categoria, status: "a_pagar",
        valor: valorParcela, data: somaDiaMes(draft.primeiroVenc, i),
        descricao: n > 1 ? `${draft.descricao.trim()} (${i + 1}/${n})` : draft.descricao.trim(),
        fornecedor_id: null, servico_id: null,
      }));
      const { error } = await db.from("financeiro").insert(linhas); if (error) throw error;
      notify(n > 1 ? `${n} parcelas agendadas.` : "Conta agendada.", "ok"); setDraft(vazio); setFormOpen(false); await onChanged();
    } catch (e) { notify("Erro: " + e.message, "error"); } finally { setBusy(false); }
  };

  return <div className="page-grid">
    <section className="metric-grid finance-metrics">
      <Metric label="Vence neste mês" value={money(doMes.reduce((s, c) => s + Number(c.valor), 0))} detail={`${doMes.length} conta(s)`} tone="orange" />
      <Metric label="Atrasadas" value={money(atrasadas.reduce((s, c) => s + Number(c.valor), 0))} detail={atrasadas.length ? `${atrasadas.length} vencida(s)` : "Nada vencido"} tone="red" />
      <Metric label="Total comprometido" value={money(totalComprometido)} detail={`${contas.length} lançamento(s)`} tone="green" />
    </section>

    <section className="content-card">
      <div className="card-head"><div><p className="kicker">SAÍDAS FUTURAS</p><h3>Agendar conta ou parcelamento</h3></div>
        <button className="ghost" onClick={() => setFormOpen(!formOpen)} disabled={mode === "claude"}>{formOpen ? "Cancelar" : mode === "claude" ? "Só o Diego lança" : "+ Nova conta"}</button></div>
      {formOpen && mode === "diego" && <div className="form-grid">
        <label>O que é*<input value={draft.descricao} onChange={(e) => setDraft({ ...draft, descricao: e.target.value })} placeholder="Ex: Aluguel · Cartão da mãe · Parcela da carretinha" /></label>
        <div className="row three">
          <label>Valor total R$*<input value={draft.valor} onChange={(e) => setDraft({ ...draft, valor: e.target.value })} placeholder="0,00" /></label>
          <label>Parcelas<input type="number" min="1" value={draft.parcelas} onChange={(e) => setDraft({ ...draft, parcelas: e.target.value })} /></label>
          <label>1º vencimento*<input type="date" value={draft.primeiroVenc} onChange={(e) => setDraft({ ...draft, primeiroVenc: e.target.value })} /></label>
        </div>
        <div className="row three">
          <label>Aba<select value={draft.escopo} onChange={(e) => setDraft({ ...draft, escopo: e.target.value })}><option value="empresa">Empresa</option><option value="pessoal">Pessoal</option></select></label>
          <label>Categoria<select value={draft.categoria} onChange={(e) => setDraft({ ...draft, categoria: e.target.value })}>{["Conta fixa", "Aluguel", "Cartão", "Dívida", "Imposto", "Outros"].map((c) => <option key={c} value={c}>{c}</option>)}</select></label>
        </div>
        <ReviewBox lines={["Não mexe no caixa até você marcar como pago", `${draft.parcelas}x de ${money(Number(String(draft.valor).replace(",", ".")) / Math.max(1, parseInt(draft.parcelas, 10) || 1))}`, `1º vencimento ${compactDate(draft.primeiroVenc)} · ${draft.escopo}`]} />
        <button className="primary wide" onClick={salvar} disabled={busy}>{busy ? "Salvando…" : "Agendar"}</button>
      </div>}
      {!formOpen && <p className="ficha-note">Tudo aqui está comprometido mas ainda não saiu — o saldo do Financeiro só muda quando você marca como pago.</p>}
    </section>

    <section className="content-card">
      <div className="card-head"><div><p className="kicker">POR VENCIMENTO</p><h3>{contas.length} conta(s) a pagar</h3></div></div>
      {!contas.length && <div className="empty-state"><b>Nenhuma saída futura agendada.</b><span>Parcela de cartão, aluguel e conta fixa entram aqui e aparecem no mês em que vão pesar.</span></div>}
      {meses.map((m) => <div key={m} className="vale-fornecedor">
        <div className="vale-fornecedor-head"><strong>{mesLabel(m)}</strong><b>{money(porMes[m].reduce((s, c) => s + Number(c.valor), 0))}</b></div>
        {porMes[m].map((c) => <div className="finance-row" key={c.id}>
          <div><strong>{c.descricao || c.categoria}</strong><span>Vence {compactDate(c.data)} · {c.escopo === "pessoal" ? "Pessoal" : "Empresa"} · {c.categoria}{(c.data || "") < hoje ? " · ATRASADA" : ""}</span></div>
          <div className="agenda-acoes"><b className="saida">{money(c.valor)}</b><button className="ghost" disabled={busy || mode === "claude"} onClick={() => pagar(c)}>Marcar pago</button></div>
        </div>)}
      </div>)}
    </section>
  </div>;
}

const DIA_LABEL = { domingo: "domingo", segunda: "segunda", terca: "terça", quarta: "quarta", quinta: "quinta", sexta: "sexta", sabado: "sábado" };
function FornecedoresView({ fornecedores }) {
  return <section className="content-card full"><div className="card-head"><div><p className="kicker">FORNECEDORES</p><h3>{fornecedores.length} cadastrado(s)</h3></div></div>
    <div className="customer-list">{fornecedores.map((f) => <article key={f.id}>
      <div className="customer-avatar">{f.nome.slice(0, 2).toUpperCase()}</div>
      <div>
        <strong>{f.nome}</strong>
        <span>{f.contato_nome ? f.contato_nome + " · " : ""}{f.telefone || "Sem telefone"}</span>
        {f.produtos && <span>{f.produtos}</span>}
        {f.dias_entrega && <span>Entrega {f.dias_entrega.split(",").map((d) => DIA_LABEL[d.trim()] || d.trim()).join(" e ")}</span>}
        {f.observacao && <span>{f.observacao}</span>}
      </div>
      {f.telefone && <a className="ghost" href={`https://wa.me/55${normalizePhone(f.telefone)}`} target="_blank" rel="noreferrer">WhatsApp</a>}
    </article>)}
    {!fornecedores.length && <div className="empty-state"><b>Nenhum fornecedor cadastrado.</b></div>}</div>
  </section>;
}
function CustomersView({ customers, services, search, setSearch, onOpenFicha }) {
  const visible = customers.filter((customer) => `${customer.nome} ${customer.telefone} ${customer.cidade}`.toLowerCase().includes(search.toLowerCase()));
  return <section className="content-card full"><div className="card-head"><div><p className="kicker">BASE ÚNICA</p><h3>{visible.length} clientes</h3></div><input className="search" value={search} onChange={(event) => setSearch(event.target.value)} placeholder="Nome, telefone ou cidade" /></div><div className="customer-list">{visible.map((customer) => <article className="clickable" key={customer.id} onClick={() => onOpenFicha(customer.id)}><div className="customer-avatar">{customer.nome.slice(0, 2).toUpperCase()}</div><div><strong>{customer.nome}</strong><span>{customer.telefone || "Sem telefone"} · {customer.cidade || "Sem cidade"}</span></div><b>{services.filter((service) => service.cliente_id === customer.id && !["pago", "perdido"].includes(service.status)).length} ativo(s)</b></article>)}</div></section>;
}

function FichaModal({ db, demo, notify, clienteId, fornecedores, onClose, onChanged }) {
  const [cliente, setCliente] = useState(null);
  const [servicos, setServicos] = useState([]);
  const [fotos, setFotos] = useState([]);
  const [loading, setLoading] = useState(true);
  const [editing, setEditing] = useState(false);
  const [form, setForm] = useState({ nome: "", telefone: "", cidade: "", endereco: "", obs: "" });
  const [saving, setSaving] = useState(false);
  const [uploading, setUploading] = useState(false);
  const [confirmPhoto, setConfirmPhoto] = useState(null);
  const [editandoResp, setEditandoResp] = useState(null);
  const [respDraft, setRespDraft] = useState("");
  const [editandoMaterial, setEditandoMaterial] = useState(null);
  const [materialDraft, setMaterialDraft] = useState({ loja: "", data: "" });

  const load = useCallback(async () => {
    setLoading(true);
    if (demo) {
      const c = demoCustomers.find((x) => x.id === clienteId) || null;
      setCliente(c); setServicos(demoServices.filter((s) => s.cliente_id === clienteId)); setFotos([]);
      if (c) setForm({ nome: c.nome || "", telefone: c.telefone || "", cidade: c.cidade || "", endereco: c.endereco || "", obs: c.obs || "" });
      setLoading(false); return;
    }
    const [c, sv, ft] = await Promise.all([
      db.from("clientes").select("*").eq("id", clienteId).single(),
      db.from("servicos").select("*").eq("cliente_id", clienteId).order("criado_em", { ascending: false }),
      db.from("fotos").select("*").eq("cliente_id", clienteId).order("criado_em", { ascending: false }),
    ]);
    if (c.error) { notify("Erro ao abrir ficha: " + c.error.message, "error"); setLoading(false); return; }
    setCliente(c.data); setServicos(sv.data || []); setFotos(ft.data || []);
    setForm({ nome: c.data.nome || "", telefone: c.data.telefone || "", cidade: c.data.cidade || "", endereco: c.data.endereco || "", obs: c.data.obs || "" });
    setLoading(false);
  }, [db, demo, clienteId, notify]);

  useEffect(() => { load(); }, [load]);

  const saveCliente = async () => {
    if (!form.nome.trim()) { notify("Nome é obrigatório.", "error"); return; }
    const telefone = corrigirTelefone(form.telefone);
    if (telefone === null) { notify("Telefone incompleto — celular precisa de DDD + 8 ou 9 dígitos.", "error"); return; }
    if (demo) { notify("Na demonstração a ficha não é salva.", "info"); setEditing(false); return; }
    setSaving(true);
    const { error } = await db.from("clientes").update({ nome: form.nome.trim(), telefone: telefone || null, cidade: form.cidade.trim() || null, endereco: form.endereco.trim() || null, obs: form.obs.trim() || null }).eq("id", clienteId);
    setSaving(false);
    if (error) { notify("Erro: " + error.message, "error"); return; }
    notify("Ficha atualizada.", "ok"); setEditing(false); await load(); onChanged?.();
  };

  const addFoto = async (file) => {
    if (!file) return;
    if (demo) { notify("Na demonstração não dá para subir foto.", "info"); return; }
    setUploading(true);
    try {
      const path = clienteId + "/" + Date.now() + "_" + file.name.replace(/[^a-zA-Z0-9._-]/g, "_");
      const { error: upErr } = await db.storage.from("fotos-servicos").upload(path, file); if (upErr) throw upErr;
      const { data, error } = await db.storage.from("fotos-servicos").createSignedUrl(path, 60 * 60 * 24 * 365); if (error) throw error;
      const { error: insErr } = await db.from("fotos").insert({ cliente_id: clienteId, url: data.signedUrl, tipo: "outro" }); if (insErr) throw insErr;
      notify("Foto adicionada.", "ok"); await load();
    } catch (e) { notify("Erro no upload: " + e.message, "error"); }
    finally { setUploading(false); }
  };

  const removeFoto = async (id) => {
    setConfirmPhoto(null);
    if (demo) { notify("Na demonstração não dá para remover foto.", "info"); return; }
    const { error } = await db.from("fotos").delete().eq("id", id);
    if (error) { notify("Erro: " + error.message, "error"); return; }
    notify("Foto removida.", "ok"); await load();
  };

  const salvarResponsavel = async (servicoId) => {
    if (demo) { notify("Na demonstração a ficha não é salva.", "info"); setEditandoResp(null); return; }
    const { error } = await db.from("servicos").update({ responsavel: respDraft.trim() || null }).eq("id", servicoId);
    if (error) { notify("Erro: " + error.message, "error"); return; }
    notify("Profissional atualizado.", "ok"); setEditandoResp(null); await load(); onChanged?.();
  };

  const salvarMaterial = async (servicoId) => {
    if (demo) { notify("Na demonstração a ficha não é salva.", "info"); setEditandoMaterial(null); return; }
    const loja = materialDraft.loja.trim();
    const data = materialDraft.data;
    const { error } = await db.from("servicos").update({ loja_material: loja || null, data_entrega_material: data || null }).eq("id", servicoId);
    if (error) { notify("Erro: " + error.message, "error"); return; }
    if (loja && data) {
      const { error: agErr } = await db.from("agenda").insert({ titulo: `Comprar material - ${loja}`, tipo: "remoto", cidade: null, data, hora: null, status: "planejado", servico_id: servicoId });
      if (agErr) { notify("Material salvo, mas erro ao criar a ação: " + agErr.message, "error"); setEditandoMaterial(null); await load(); return; }
    }
    notify("Material atualizado.", "ok"); setEditandoMaterial(null); await load(); onChanged?.();
  };

  return <div className="modal-overlay" onMouseDown={(e) => { if (e.target === e.currentTarget) onClose(); }}>
    <div className="modal-card">
      <div className="modal-head"><div><p className="kicker">FICHA DO CLIENTE</p><h2>{cliente?.nome || "Cliente"}</h2></div><button className="ghost" onClick={onClose}>Fechar</button></div>
      {loading ? <div className="empty-state"><b>Carregando…</b></div> : !cliente ? <div className="empty-state"><b>Cliente não encontrado.</b></div> : <>
        {!editing ? <div className="ficha-fields">
          {cliente.telefone && <div className="ficha-field"><small>TELEFONE</small><span>{cliente.telefone}</span></div>}
          {cliente.cidade && <div className="ficha-field"><small>CIDADE</small><span>{cliente.cidade}</span></div>}
          {cliente.endereco && <div className="ficha-field"><small>ENDEREÇO</small><span>{cliente.endereco}</span></div>}
          {cliente.obs && <div className="ficha-field wide"><small>OBSERVAÇÕES</small><span>{cliente.obs}</span></div>}
          <div className="ficha-actions"><button className="ghost" onClick={() => setEditing(true)}>Editar dados</button>{cliente.telefone && <a className="ghost" href={`https://wa.me/55${normalizePhone(cliente.telefone)}`} target="_blank" rel="noreferrer">WhatsApp</a>}</div>
        </div> : <div className="ficha-edit form-grid">
          <div className="row"><label>Nome*<input value={form.nome} onChange={(e) => setForm((f) => ({ ...f, nome: e.target.value }))} /></label><label>Telefone<input value={form.telefone} onChange={(e) => setForm((f) => ({ ...f, telefone: e.target.value }))} /></label></div>
          <div className="row"><label>Cidade<input value={form.cidade} onChange={(e) => setForm((f) => ({ ...f, cidade: e.target.value }))} /></label><label>Endereço<input value={form.endereco} onChange={(e) => setForm((f) => ({ ...f, endereco: e.target.value }))} /></label></div>
          <label>Observações<textarea value={form.obs} onChange={(e) => setForm((f) => ({ ...f, obs: e.target.value }))} /></label>
          <div className="ficha-actions"><button className="primary" onClick={saveCliente} disabled={saving}>{saving ? "Salvando…" : "Salvar"}</button><button className="ghost" onClick={() => { setEditing(false); setForm({ nome: cliente.nome || "", telefone: cliente.telefone || "", cidade: cliente.cidade || "", endereco: cliente.endereco || "", obs: cliente.obs || "" }); }}>Cancelar</button></div>
        </div>}

        <h3 className="ficha-section">Histórico de serviços</h3>
        {!servicos.length ? <div className="empty-state"><b>Nenhum serviço registrado.</b></div> : <div className="ficha-servicos">{servicos.map((s) => { const sugestao = s.sugestao_resposta || ""; const tel = cliente.telefone ? normalizePhone(cliente.telefone) : ""; return <div className={`ficha-servico priority-${s.prioridade || "media"}`} key={s.id}><div className="ficha-servico-main"><strong>{s.titulo}</strong><span>{statusLabel[s.status] || s.status}{s.proxima_acao ? " · " + s.proxima_acao : ""}</span>
          {editandoResp === s.id
            ? <div className="responsavel-edit-row"><input value={respDraft} onChange={(e) => setRespDraft(e.target.value)} placeholder="Nome do profissional" autoFocus /><button className="ghost" onClick={() => salvarResponsavel(s.id)}>Salvar</button><button className="ghost" onClick={() => setEditandoResp(null)}>✕</button></div>
            : <button type="button" className="responsavel-badge" onClick={() => { setEditandoResp(s.id); setRespDraft(s.responsavel || ""); }}>{s.responsavel ? `👤 ${s.responsavel}` : "+ Atribuir profissional"}</button>}
          {s.status === "producao" && (editandoMaterial === s.id
            ? <div className="material-edit-block">
                <div className="responsavel-edit-row"><input value={materialDraft.loja} onChange={(e) => setMaterialDraft((m) => ({ ...m, loja: e.target.value }))} placeholder="Loja do material" /><input type="date" value={materialDraft.data} onChange={(e) => setMaterialDraft((m) => ({ ...m, data: e.target.value }))} /><button className="ghost" onClick={() => salvarMaterial(s.id)}>Salvar</button><button className="ghost" onClick={() => setEditandoMaterial(null)}>✕</button></div>
                {!!(fornecedores || []).length && <div className="fornecedor-chips">{fornecedores.map((f) => <button type="button" key={f.id} className={materialDraft.loja.trim() === f.nome ? "active" : ""} onClick={() => setMaterialDraft({ loja: f.nome, data: proximaEntregaFornecedor(f.dias_entrega) || materialDraft.data })}>{f.nome}</button>)}</div>}
              </div>
            : <button type="button" className="responsavel-badge" onClick={() => { setEditandoMaterial(s.id); setMaterialDraft({ loja: s.loja_material || "", data: s.data_entrega_material || "" }); }}>{s.loja_material ? `🧵 ${s.loja_material}${s.data_entrega_material ? " · entrega " + compactDate(s.data_entrega_material) : ""}` : "+ Registrar loja/entrega do material"}</button>)}
        </div><div className="ficha-servico-meta">{s.valor_orcamento ? <b>{money(s.valor_orcamento)}</b> : <span>—</span>}{s.prazo && <time>{compactDate(s.prazo)}</time>}{(sugestao || tel) && <div className="ficha-servico-acoes">{sugestao && <button className="ghost" title="Copiar sugestão" onClick={() => navigator.clipboard.writeText(sugestao)}>📋</button>}{tel && <a className="ghost" href={`https://wa.me/55${tel}${sugestao ? "?text=" + encodeURIComponent(sugestao) : ""}`} target="_blank" rel="noreferrer">WhatsApp</a>}</div>}</div></div>; })}</div>}
        <p className="ficha-note">Mudança de status e financeiro continuam no app atual por enquanto.</p>

        <h3 className="ficha-section">Fotos</h3>
        <div className="foto-grid">
          {fotos.map((f) => <div className="foto" key={f.id}><img src={f.url} alt={f.tipo || "foto"} />{f.tipo && <span className="foto-tag">{f.tipo}</span>}{confirmPhoto === f.id ? <div className="foto-confirm"><button onClick={() => removeFoto(f.id)}>Remover</button><button onClick={() => setConfirmPhoto(null)}>Não</button></div> : <button className="foto-rm" onClick={() => setConfirmPhoto(f.id)}>✕</button>}</div>)}
          <label className="foto-add">{uploading ? "Enviando…" : "+ Foto"}<input type="file" accept="image/*" capture="environment" onChange={(e) => addFoto(e.target.files?.[0])} /></label>
        </div>
      </>}
    </div>
  </div>;
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Home />);
</script>
