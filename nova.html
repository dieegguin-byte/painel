        <button className="primary wide" onClick={props.onCustomer} disabled={busy}>Confirmar triagem</button>
      </div>}
      {form.kind === "agenda" && <div className="form-grid"><p className="form-title">2 · Compromisso avulso</p><label>Compromisso*<input value={form.service} onChange={(event) => updateForm("service", event.target.value)} /></label><div className="row"><label>Data*<input type="date" value={form.due} onChange={(event) => updateForm("due", event.target.value)} /></label><label>Hora<input type="time" value={form.time} onChange={(event) => updateForm("time", event.target.value)} /></label></div><div className="row"><label>Tipo<select value={form.agendaType} onChange={(event) => updateForm("agendaType", event.target.value)}><option value="remoto">Remoto</option><option value="presencial">Presencial</option></select></label><label>Cidade presencial<input value={form.city} onChange={(event) => updateForm("city", event.target.value)} disabled={form.agendaType === "remoto"} /></label></div><ReviewBox lines={[form.service || "Sem título", `${form.due || "sem data"} · ${form.time || "primeiro horário livre"}`, `${form.agendaType}${form.city ? ` · ${form.city}` : ""}`]} /><button className="primary wide" onClick={props.onAgenda} disabled={busy}>Confirmar compromisso</button></div>}
      {form.kind === "financeiro" && mode === "diego" && <div className="form-grid"><p className="form-title">2 · Financeiro avulso</p><label>Descrição*<input value={form.service} onChange={(event) => updateForm("service", event.target.value)} /></label><div className="row three"><label>Valor R$*<input value={form.value} onChange={(event) => updateForm("value", event.target.value)} /></label><label>Tipo<select value={form.financeType} onChange={(event) => updateForm("financeType", event.target.value)}><option value="saida">Saída</option><option value="entrada">Entrada</option></select></label><label>Status<select value={form.financeStatus} onChange={(event) => updateForm("financeStatus", event.target.value)}><option value="a_pagar">A pagar</option><option value="a_receber">A receber</option><option value="pago">Pago</option></select></label></div><label>Data*<input type="date" value={form.due} onChange={(event) => updateForm("due", event.target.value)} /></label><ReviewBox lines={[form.service || "Sem descrição", `${form.financeType} · ${form.financeStatus}`, `${money(form.value)} · ${form.due || "sem data"}`]} /><button className="primary wide" onClick={props.onFinance} disabled={busy}>Confirmar lançamento</button></div>}
      <div className="ask-panel"><p className="kicker">OU · PEDIR INFORMAÇÃO</p><p>Antes de perguntar, confirme que a resposta não está no próprio sistema.</p><div className="audit-checks"><label><input type="checkbox" checked={form.checkedCustomers} onChange={(event) => updateForm("checkedCustomers", event.target.checked)} />Clientes e serviços</label><label><input type="checkbox" checked={form.checkedAgenda} onChange={(event) => updateForm("checkedAgenda", event.target.checked)} />Agenda</label><label><input type="checkbox" checked={form.checkedFinance} onChange={(event) => updateForm("checkedFinance", event.target.checked)} />Financeiro</label></div><textarea value={form.question} onChange={(event) => updateForm("question", event.target.value)} placeholder="Qual dado crítico falta para decidir?" /><button className="secondary" onClick={props.onAsk} disabled={busy}>Perguntar ao Diego e pausar</button></div>
    </>}
  </div>;
}

function ReviewBox({ lines }) { return <div className="review-box"><p className="kicker">SERÁ GRAVADO</p>{lines.map((line) => <span key={line}>✓ {line}</span>)}</div>; }

function Dashboard({ inbox, services, appointments, finances, onOpenQueue, onConcluir, onReschedule, onLeadAcao, onOpenFicha }) {
  const today = new Date().toISOString().slice(0, 10); const due = appointments.filter((entry) => entry.data <= today); const noAction = services.filter((entry) => !entry.proxima_acao); const openFin = finances.filter((entry) => entry.status && entry.status !== "pago" && entry.data <= today);
  return <div className="page-grid"><section className="hero-summary"><div><p className="kicker">VISÃO OPERACIONAL</p><h2>Clareza antes de velocidade.</h2><p>O site separa a vez do Claude, a sua vez e as decisões que exigem aprovação.</p></div><button className="primary" onClick={onOpenQueue}>Abrir fila de entrada</button></section><section className="metric-grid"><Metric label="Para Claude" value={inbox.filter((entry) => ["novo", "respondido"].includes(entry.status || "novo")).length} detail="Novos e respondidos" tone="orange" /><Metric label="Aguardando você" value={inbox.filter((entry) => entry.status === "aguardando_voce").length} detail="Perguntas no app" tone="red" /><Metric label="Agenda vencendo" value={due.length} detail="Hoje ou atrasada" tone="yellow" /><Metric label="Sem próxima ação" value={noAction.length} detail="Leads que podem parar" tone="green" /></section>
    {due.length > 0 && <section className="content-card"><div className="card-head"><div><p className="kicker">AGENDA</p><h3>Compromissos de hoje e atrasados</h3></div></div>{[...due].sort((a, b) => (a.data + (a.hora || "")).localeCompare(b.data + (b.hora || ""))).map((a) => <div className="priority-row agenda-painel-row" key={a.id}><i className={`priority ${a.data < today ? "alta" : "media"}`}></i><div><strong>{a.titulo}</strong><span>{compactDate(a.data)}{a.data < today ? " · atrasado" : " · hoje"}{a.hora ? ` · ${a.hora.slice(0, 5)}` : ""}{a.tipo === "remoto" ? " · Remoto" : a.cidade ? ` · ${a.cidade}` : ""}</span></div><div className="agenda-acoes"><button className="ghost" onClick={() => onConcluir(a)}>✓ Concluir</button><button className="ghost" onClick={() => onReschedule(a)}>Reagendar</button></div></div>)}</section>}
    <section className="content-card"><div className="card-head"><div><p className="kicker">PRIORIDADES</p><h3>O que pede ação</h3></div></div>{[...services].filter((service) => service.proxima_acao).sort((a, b) => String(a.prazo || "9").localeCompare(String(b.prazo || "9"))).slice(0, 7).map((service) => { const sugestao = service.sugestao_resposta || ""; const tel = service.clientes?.telefone ? normalizePhone(service.clientes.telefone) : ""; return <div className="priority-row" key={service.id}><i className={`priority ${service.prioridade || "media"}`}></i><div><strong className="ficha-link" onClick={() => onOpenFicha(service.cliente_id)}>{service.clientes?.nome || "Cliente"} · {service.titulo}</strong><span>{service.proxima_acao || "Sem próxima ação definida"} · {compactDate(service.prazo)}</span></div><div className="agenda-acoes">{sugestao && <button className="ghost" title="Copiar sugestão" onClick={() => { navigator.clipboard.writeText(sugestao); }}>📋</button>}{tel && <a className="ghost" href={`https://wa.me/55${tel}${sugestao ? "?text=" + encodeURIComponent(sugestao) : ""}`} target="_blank" rel="noreferrer">WhatsApp</a>}<button className="ghost" onClick={() => onLeadAcao(service, "concluir")}>✓ Concluir</button><button className="ghost" onClick={() => onLeadAcao(service, "reagendar")}>Reagendar</button></div></div>; })}</section>{openFin.length > 0 && <section className="warning-card"><b>{openFin.length} item(ns) financeiro(s) vencendo ou atrasados</b><span>Somente Diego pode alterar ou confirmar pagamentos.</span></section>}</div>;
}
function Metric({ label, value, detail, tone }) { return <article className={`metric-card ${tone}`}><span>{label}</span><b>{String(value).padStart(2, "0")}</b><small>{detail}</small></article>; }

function LeadsView({ services, search, setSearch, onOpenFicha }) {
  const visible = services.filter((service) => `${service.clientes?.nome} ${service.titulo}`.toLowerCase().includes(search.toLowerCase()));
  return <section className="content-card full"><div className="card-head"><div><p className="kicker">FUNIL DE TRABALHO</p><h3>{visible.length} serviços ativos</h3></div><input className="search" value={search} onChange={(event) => setSearch(event.target.value)} placeholder="Buscar cliente ou serviço" /></div><div className="records-grid">{visible.map((service) => <article className={`record-card priority-${service.prioridade || "media"}`} key={service.id}><div className="record-top"><span className="status-pill">{statusLabel[service.status] || service.status}</span><time>{compactDate(service.prazo)}</time></div><h4 className="ficha-link" onClick={() => onOpenFicha(service.cliente_id)}>{service.clientes?.nome || "Cliente"}</h4><p>{service.titulo}</p><div className="next-action"><small>PRÓXIMA AÇÃO</small>{service.proxima_acao || "Não definida"}</div><footer>{service.valor_orcamento ? <b>{money(service.valor_orcamento)}</b> : <span>Sem valor</span>}{service.clientes?.telefone && <a href={`https://wa.me/55${normalizePhone(service.clientes.telefone)}`} target="_blank" rel="noreferrer">WhatsApp</a>}</footer></article>)}</div></section>;
}

function AgendaView({ appointments, onReschedule, onConcluir, onAdd }) {
  const groups = appointments.reduce((acc, item) => { (acc[item.data] ||= []).push(item); return acc; }, {});
  const dias = Object.keys(groups).sort();
  const conflitosDoDia = (items) => { const chaves = new Set(items.filter((a) => (a.tipo || "presencial") === "presencial" && a.cidade).map((a) => cidadeChave(a.cidade))); return chaves.size > 1 ? [...chaves] : null; };
  return <section className="content-card full">
    <div className="card-head"><div><p className="kicker">ROTINA E DESLOCAMENTO</p><h3>Agenda planejada</h3></div><button className="primary" onClick={onAdd}>+ Adicionar</button></div>
    {!dias.length && <div className="empty-state"><b>Sem compromissos planejados.</b><span>Toque em “+ Adicionar” para criar.</span></div>}
    {dias.map((date) => { const items = groups[date]; const conf = conflitosDoDia(items); return <div className="agenda-day" key={date}>
      <div className="day-label"><b>{compactDate(date)}</b><span>{items.length} compromisso(s)</span>{conf && <span className="agenda-conflito">⚠️ rota: {conf.join(" / ")}</span>}</div>
      <div>{[...items].sort((a, b) => (a.hora || "99").localeCompare(b.hora || "99")).map((item) => <article className="agenda-row" key={item.id}><time>{item.hora?.slice(0, 5) || "—"}</time><i>{item.tipo === "remoto" ? "◌" : "⌖"}</i><div><strong>{item.titulo}</strong><span>{item.tipo === "remoto" ? "Remoto" : item.cidade || "Cidade não informada"}</span></div><div className="agenda-acoes"><button className="ghost" onClick={() => onConcluir(item)}>✓ Concluir</button><button className="ghost" onClick={() => onReschedule(item)}>Reagendar</button></div></article>)}</div>
    </div>; })}
  </section>;
}

function AddAgendaModal({ appointments, db, demo, notify, onClose, onDone }) {
  const [form, setForm] = useState({ titulo: "", tipo: "presencial", cidade: "" });
  const [pickerOpen, setPickerOpen] = useState(false);
  const [busy, setBusy] = useState(false);
  const submit = () => {
    if (!form.titulo.trim()) { notify("Descreva o compromisso.", "error"); return; }
    if (form.tipo === "presencial" && !form.cidade.trim()) { notify("Compromisso presencial precisa de cidade.", "error"); return; }
    setPickerOpen(true);
  };
  const onPicked = async (dataISO, hora) => {
    setPickerOpen(false);
    if (demo) { notify("Na demonstração a agenda não é salva.", "info"); onClose(); return; }
    setBusy(true);
    try {
      const { error } = await db.from("agenda").insert({ titulo: form.titulo.trim(), data: dataISO, hora, cidade: form.tipo === "presencial" ? form.cidade.trim() : null, tipo: form.tipo, status: "planejado" });
      if (error) throw error;
      notify("Compromisso adicionado.", "ok"); onDone();
    } catch (e) { notify("Erro: " + e.message, "error"); } finally { setBusy(false); }
  };
  const apptDesc = { titulo: form.titulo.trim() || "Novo compromisso", tipo: form.tipo, cidade: form.tipo === "presencial" ? form.cidade.trim() : null };
  return <>
    <div className="modal-overlay" onMouseDown={(e) => { if (e.target === e.currentTarget) onClose(); }}><div className="modal-card small">
      <div className="modal-head"><div><p className="kicker">NOVO COMPROMISSO</p><h2>Adicionar</h2></div><button className="ghost" onClick={onClose}>Fechar</button></div>
      <div className="form-grid">
        <label>Compromisso*<input value={form.titulo} onChange={(e) => setForm((f) => ({ ...f, titulo: e.target.value }))} /></label>
        <div className="row"><label>Tipo<select value={form.tipo} onChange={(e) => setForm((f) => ({ ...f, tipo: e.target.value }))}><option value="presencial">Presencial</option><option value="remoto">Remoto</option></select></label><label>Cidade{form.tipo === "presencial" ? "*" : ""}<input value={form.cidade} onChange={(e) => setForm((f) => ({ ...f, cidade: e.target.value }))} disabled={form.tipo === "remoto"} /></label></div>
        <button className="primary wide" onClick={submit} disabled={busy}>Escolher dia e horário</button>
      </div>
    </div></div>
    {pickerOpen && <AgendaPicker appointments={appointments} appt={apptDesc} onClose={() => setPickerOpen(false)} onPicked={onPicked} />}
  </>;
}

function ConcluirModal({ db, demo, notify, appt, onClose, onDone }) {
  const [step, setStep] = useState("choose");
  const [pendente, setPendente] = useState("");
  const [busy, setBusy] = useState(false);
  const openParcial = () => { setPendente(sugerirPendente(appt.titulo)); setStep("parcial"); };
  const doTotal = async () => {
    if (demo) { notify("Concluído (demo).", "ok"); onDone({ agendaId: appt.id, servicoId: appt.servico_id || null, proximaAcao: null }); return; }
    setBusy(true);
    try {
      const { error } = await db.from("agenda").update({ status: "feito" }).eq("id", appt.id); if (error) throw error;
      if (appt.servico_id) {
        const { error: sErr } = await db.from("servicos").update({ proxima_acao: null, atualizado_em: new Date().toISOString() }).eq("id", appt.servico_id); if (sErr) throw sErr;
        await db.from("historico").insert({ o_que: `"${appt.titulo}" concluído`, por: "diego" });
      }
      notify("Concluído.", "ok"); onDone({ agendaId: appt.id, servicoId: appt.servico_id || null, proximaAcao: null });
    } catch (e) { notify("Erro: " + e.message, "error"); } finally { setBusy(false); }
  };
  const doParcial = async () => {
    if (!pendente.trim()) { notify("Explique o que ficou pendente.", "error"); return; }
    if (demo) { notify("Anotado (demo).", "ok"); onDone({ agendaId: appt.id, servicoId: appt.servico_id || null, proximaAcao: pendente.trim() }); return; }
    setBusy(true);
    try {
      const nota = `Reagendar (parcial): "${appt.titulo}"${appt.cidade ? " · " + appt.cidade : ""}${appt.tipo === "remoto" ? " · remoto" : ""}. Ficou pendente: ${pendente.trim()}.${appt.servico_id ? " (serviço #" + appt.servico_id + ")" : ""}`;
      const { error: cxErr } = await db.from("caixa_entrada").insert({ texto: nota, status: "novo", conversa: [], processado: false }); if (cxErr) throw cxErr;
      const { error } = await db.from("agenda").update({ status: "feito" }).eq("id", appt.id); if (error) throw error;
      if (appt.servico_id) { const { error: sErr } = await db.from("servicos").update({ proxima_acao: pendente.trim(), atualizado_em: new Date().toISOString() }).eq("id", appt.servico_id); if (sErr) throw sErr; }
      await db.from("historico").insert({ o_que: `"${appt.titulo}": parcial — Claude vai reagendar`, por: "diego", detalhe: "Pendente: " + pendente.trim() });
      notify("Anotado. O Claude reagenda na próxima vez que você chamar.", "ok"); onDone({ agendaId: appt.id, servicoId: appt.servico_id || null, proximaAcao: pendente.trim() });
    } catch (e) { notify("Erro: " + e.message, "error"); } finally { setBusy(false); }
  };
  return <div className="modal-overlay" onMouseDown={(e) => { if (e.target === e.currentTarget) onClose(); }}>
    <div className="modal-card small">
      <div className="modal-head"><div><p className="kicker">CONCLUIR COMPROMISSO</p><h2>{appt.titulo}</h2></div><button className="ghost" onClick={onClose}>Fechar</button></div>
      {step === "choose" ? <div className="concluir-opcoes">
        <p className="modal-intro">Foi concluído totalmente ou ficou pendência?</p>
        <button className="primary wide" onClick={doTotal} disabled={busy}>✔ Concluído total — acabou</button>
        <button className="secondary wide" onClick={openParcial} disabled={busy}>🟡 Parcial — falta algo, o Claude reagenda</button>
      </div> : <div className="form-grid">
        <label>Explique o que ficou pendente<textarea value={pendente} onChange={(e) => setPendente(e.target.value)} /></label>
        <p className="ficha-note">Você só explica o que faltou — o Claude reagenda na próxima vez que você chamar. Não precisa escolher data agora.</p>
        <div className="ficha-actions"><button className="primary" onClick={doParcial} disabled={busy}>Registrar pro Claude</button><button className="ghost" onClick={() => setStep("choose")}>Voltar</button></div>
      </div>}
    </div>
  </div>;
}

function ExplicarModal({ db, demo, notify, item, kind, onClose, onDone }) {
  const ehReagendar = kind === "reagendar";
  const [texto, setTexto] = useState(ehReagendar ? sugerirPendente(item.titulo) : "");
  const [busy, setBusy] = useState(false);
  const submit = async () => {
    if (!texto.trim()) { notify("Escreva uma explicação pro Claude.", "error"); return; }
    const alvoServicoDemo = item.tipoItem === "agenda" ? item.servico_id : item.id;
    if (demo) { notify("Anotado (demo).", "ok"); onDone({ agendaId: (item.tipoItem === "agenda" && ehReagendar) ? item.id : null, servicoId: alvoServicoDemo || null, proximaAcao: null }); return; }
    setBusy(true);
    try {
      const ref = item.tipoItem === "agenda" ? `(agenda #${item.id}${item.servico_id ? ", serviço #" + item.servico_id : ""})` : `(serviço #${item.id})`;
      const cabec = ehReagendar ? "Reagendar" : "Concluir lead";
      const ctx = `${item.cliente ? item.cliente + " · " : ""}${item.titulo}${item.cidade ? " · " + item.cidade : ""}${item.tipo === "remoto" ? " · remoto" : ""}`;
      const nota = `${cabec}: ${ctx}. ${ehReagendar ? "Explicação" : "O que aconteceu"}: ${texto.trim()}. ${ref}`;
      const { error: cxErr } = await db.from("caixa_entrada").insert({ texto: nota, status: "novo", conversa: [], processado: false }); if (cxErr) throw cxErr;
      if (item.tipoItem === "agenda" && ehReagendar) { const { error } = await db.from("agenda").update({ status: "feito" }).eq("id", item.id); if (error) throw error; }
      const alvoServico = item.tipoItem === "agenda" ? item.servico_id : item.id;
      if (alvoServico) { const { error: sErr } = await db.from("servicos").update({ proxima_acao: null, atualizado_em: new Date().toISOString() }).eq("id", alvoServico); if (sErr) throw sErr; }
      await db.from("historico").insert({ o_que: `${cabec}: ${item.titulo}`, por: "diego", detalhe: texto.trim() });
      notify("Anotado. Saiu da lista — o Claude cuida disso quando você chamar.", "ok"); onDone({ agendaId: (item.tipoItem === "agenda" && ehReagendar) ? item.id : null, servicoId: alvoServico || null, proximaAcao: null });
    } catch (e) { notify("Erro: " + e.message, "error"); } finally { setBusy(false); }
  };
  return <div className="modal-overlay" onMouseDown={(e) => { if (e.target === e.currentTarget) onClose(); }}>
    <div className="modal-card small">
      <div className="modal-head"><div><p className="kicker">{ehReagendar ? "REAGENDAR" : "CONCLUIR"}</p><h2>{item.titulo}</h2></div><button className="ghost" onClick={onClose}>Fechar</button></div>
      <div className="form-grid">
        <label>{ehReagendar ? "O que explicar pro Claude?" : "O que foi feito / o que o Claude deve fazer?"}<textarea value={texto} onChange={(e) => setTexto(e.target.value)} /></label>
        <p className="ficha-note">{ehReagendar ? "Você só explica — o Claude abre o calendário e reagenda na próxima vez que você chamar. Não precisa escolher a data agora." : "Você explica o que rolou — o Claude atualiza o lead (status, próximo passo) na próxima vez que você chamar."}</p>
        <div className="ficha-actions"><button className="primary" onClick={submit} disabled={busy}>Registrar pro Claude</button><button className="ghost" onClick={onClose}>Cancelar</button></div>
      </div>
    </div>
  </div>;
}

function AgendaPicker({ appointments, appt, onClose, onPicked }) {
  const tipo = appt.tipo || "presencial";
  const cidade = tipo === "presencial" ? (appt.cidade || "") : null;
  const hoje = new Date();
  const porDia = {};
  appointments.forEach((a) => { if (a.id && a.id === appt.id) return; (porDia[a.data] = porDia[a.data] || []).push(a); });
  const dias = [];
  for (let i = 0; i < 14; i++) {
    const d = new Date(hoje); d.setDate(d.getDate() + i);
    const dataISO = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
    const doDia = porDia[dataISO] || [];
    const ocupados = tipo === "presencial" ? doDia.filter((a) => (a.tipo || "presencial") === "presencial" && cidadeChave(a.cidade) === cidadeChave(cidade)).map((a) => a.hora) : [];
    const livres = horariosParaTipo(dataISO, tipo, ocupados);
    if (!livres.length) continue;
    const cidadesDoDia = [...new Set(doDia.filter((a) => (a.tipo || "presencial") === "presencial" && a.cidade).map((a) => a.cidade))];
    const outrasCidades = tipo === "presencial" && cidade ? doDia.filter((a) => (a.tipo || "presencial") === "presencial" && a.cidade && a.hora && cidadeChave(a.cidade) !== cidadeChave(cidade)) : [];
    dias.push({ dataISO, doDia, livres, cidadesDoDia, outrasCidades, conflito: outrasCidades.length > 0 });
  }
  return <div className="modal-overlay" onMouseDown={(e) => { if (e.target === e.currentTarget) onClose(); }}>
    <div className="modal-card small">
      <div className="modal-head"><div><p className="kicker">ESCOLHER DIA E HORÁRIO</p><h2>{appt.titulo || "Compromisso"}</h2></div><button className="ghost" onClick={onClose}>Fechar</button></div>
      <p className="modal-intro">{tipo === "remoto" ? "Tarefa remota — qualquer horário das 07h às 22h." : `Presencial${cidade ? " em " + cidade : ""} — respeitando sua rotina da semana.`}</p>
      {!dias.length ? <div className="empty-state"><b>Sem horário livre nos próximos 14 dias.</b></div> : dias.map((dia) => <div className="picker-day" key={dia.dataISO}>
        <div className={`picker-day-label${dia.conflito ? " conflito" : ""}`}>{compactDate(dia.dataISO)}{dia.doDia.length ? ` · ${dia.doDia.length} compromisso(s)` : " · dia livre"}{dia.cidadesDoDia.length ? ` · 🏙 ${dia.cidadesDoDia.join(", ")}` : ""}</div>
        {dia.conflito && <div className="picker-aviso">⚠️ Já tem {dia.outrasCidades.map((a) => `${(a.hora || "").slice(0, 5)} em ${a.cidade}`).join(", ")} — horários em vermelho não dão tempo de serviço + estrada.</div>}
        <div className="picker-slots">{dia.livres.map((h) => { const risky = horarioApertado(h, dia.outrasCidades, cidade); return <button key={h} className={`picker-slot${risky ? " risky" : ""}`} title={risky ? "Muito perto do compromisso em outra cidade — serviço + estrada não fecha." : ""} onClick={() => onPicked(dia.dataISO, h)}>{h}</button>; })}</div>
      </div>)}
    </div>
  </div>;
}

function FinanceView({ finances }) {
  const paidIn = finances.filter((item) => item.tipo === "entrada" && (!item.status || item.status === "pago")).reduce((sum, item) => sum + Number(item.valor), 0); const paidOut = finances.filter((item) => item.tipo === "saida" && (!item.status || item.status === "pago")).reduce((sum, item) => sum + Number(item.valor), 0);
  return <div className="page-grid"><section className="metric-grid finance-metrics"><Metric label="Entradas" value={money(paidIn)} detail="Confirmadas" tone="green" /><Metric label="Saídas" value={money(paidOut)} detail="Confirmadas" tone="red" /><Metric label="Saldo" value={money(paidIn - paidOut)} detail="Visão operacional" tone="orange" /></section><section className="content-card"><div className="card-head"><div><p className="kicker">SOMENTE LEITURA NO MODO CLAUDE</p><h3>Lançamentos</h3></div></div>{finances.map((item) => <div className="finance-row" key={item.id}><div><strong>{item.descricao || item.categoria || "Lançamento"}</strong><span>{compactDate(item.data)} · {item.status || "pago"}</span></div><b className={item.tipo}>{item.tipo === "saida" ? "−" : "+"} {money(item.valor)}</b></div>)}</section></div>;
}

function CustomersView({ customers, services, search, setSearch, onOpenFicha }) {
  const visible = customers.filter((customer) => `${customer.nome} ${customer.telefone} ${customer.cidade}`.toLowerCase().includes(search.toLowerCase()));
  return <section className="content-card full"><div className="card-head"><div><p className="kicker">BASE ÚNICA</p><h3>{visible.length} clientes</h3></div><input className="search" value={search} onChange={(event) => setSearch(event.target.value)} placeholder="Nome, telefone ou cidade" /></div><div className="customer-list">{visible.map((customer) => <article className="clickable" key={customer.id} onClick={() => onOpenFicha(customer.id)}><div className="customer-avatar">{customer.nome.slice(0, 2).toUpperCase()}</div><div><strong>{customer.nome}</strong><span>{customer.telefone || "Sem telefone"} · {customer.cidade || "Sem cidade"}</span></div><b>{services.filter((service) => service.cliente_id === customer.id && !["pago", "perdido"].includes(service.status)).length} ativo(s)</b></article>)}</div></section>;
}

function FichaModal({ db, demo, notify, clienteId, onClose, onChanged }) {
  const [cliente, setCliente] = useState(null);
  const [servicos, setServicos] = useState([]);
  const [fotos, setFotos] = useState([]);
  const [loading, setLoading] = useState(true);
  const [editing, setEditing] = useState(false);
  const [form, setForm] = useState({ nome: "", telefone: "", cidade: "", endereco: "", obs: "" });
  const [saving, setSaving] = useState(false);
  const [uploading, setUploading] = useState(false);
  const [confirmPhoto, setConfirmPhoto] = useState(null);

  const load = useCallback(async () => {
    setLoading(true);
    if (demo) {
      const c = demoCustomers.find((x) => x.id === clienteId) || null;
      setCliente(c); setServicos(demoServices.filter((s) => s.cliente_id === clienteId)); setFotos([]);
      if (c) setForm({ nome: c.nome || "", telefone: c.telefone || "", cidade: c.cidade || "", endereco: c.endereco || "", obs: c.obs || "" });
      setLoading(false); return;
    }
    const [c, sv, ft] = await Promise.all([
      db.from("clientes").select("*").eq("id", clienteId).single(),
      db.from("servicos").select("*").eq("cliente_id", clienteId).order("criado_em", { ascending: false }),
      db.from("fotos").select("*").eq("cliente_id", clienteId).order("criado_em", { ascending: false }),
    ]);
    if (c.error) { notify("Erro ao abrir ficha: " + c.error.message, "error"); setLoading(false); return; }
    setCliente(c.data); setServicos(sv.data || []); setFotos(ft.data || []);
    setForm({ nome: c.data.nome || "", telefone: c.data.telefone || "", cidade: c.data.cidade || "", endereco: c.data.endereco || "", obs: c.data.obs || "" });
    setLoading(false);
  }, [db, demo, clienteId, notify]);

  useEffect(() => { load(); }, [load]);

  const saveCliente = async () => {
    if (!form.nome.trim()) { notify("Nome é obrigatório.", "error"); return; }
    if (demo) { notify("Na demonstração a ficha não é salva.", "info"); setEditing(false); return; }
    setSaving(true);
    const { error } = await db.from("clientes").update({ nome: form.nome.trim(), telefone: form.telefone.trim() || null, cidade: form.cidade.trim() || null, endereco: form.endereco.trim() || null, obs: form.obs.trim() || null }).eq("id", clienteId);
    setSaving(false);
    if (error) { notify("Erro: " + error.message, "error"); return; }
    notify("Ficha atualizada.", "ok"); setEditing(false); await load(); onChanged?.();
  };

  const addFoto = async (file) => {
    if (!file) return;
    if (demo) { notify("Na demonstração não dá para subir foto.", "info"); return; }
    setUploading(true);
    try {
      const path = clienteId + "/" + Date.now() + "_" + file.name.replace(/[^a-zA-Z0-9._-]/g, "_");
      const { error: upErr } = await db.storage.from("fotos-servicos").upload(path, file); if (upErr) throw upErr;
      const { data, error } = await db.storage.from("fotos-servicos").createSignedUrl(path, 60 * 60 * 24 * 365); if (error) throw error;
      const { error: insErr } = await db.from("fotos").insert({ cliente_id: clienteId, url: data.signedUrl, tipo: "outro" }); if (insErr) throw insErr;
      notify("Foto adicionada.", "ok"); await load();
    } catch (e) { notify("Erro no upload: " + e.message, "error"); }
    finally { setUploading(false); }
  };

  const removeFoto = async (id) => {
    setConfirmPhoto(null);
    if (demo) { notify("Na demonstração não dá para remover foto.", "info"); return; }
    const { error } = await db.from("fotos").delete().eq("id", id);
    if (error) { notify("Erro: " + error.message, "error"); return; }
    notify("Foto removida.", "ok"); await load();
  };

  return <div className="modal-overlay" onMouseDown={(e) => { if (e.target === e.currentTarget) onClose(); }}>
    <div className="modal-card">
      <div className="modal-head"><div><p className="kicker">FICHA DO CLIENTE</p><h2>{cliente?.nome || "Cliente"}</h2></div><button className="ghost" onClick={onClose}>Fechar</button></div>
      {loading ? <div className="empty-state"><b>Carregando…</b></div> : !cliente ? <div className="empty-state"><b>Cliente não encontrado.</b></div> : <>
        {!editing ? <div className="ficha-fields">
          {cliente.telefone && <div className="ficha-field"><small>TELEFONE</small><span>{cliente.telefone}</span></div>}
          {cliente.cidade && <div className="ficha-field"><small>CIDADE</small><span>{cliente.cidade}</span></div>}
          {cliente.endereco && <div className="ficha-field"><small>ENDEREÇO</small><span>{cliente.endereco}</span></div>}
          {cliente.obs && <div className="ficha-field wide"><small>OBSERVAÇÕES</small><span>{cliente.obs}</span></div>}
          <div className="ficha-actions"><button className="ghost" onClick={() => setEditing(true)}>Editar dados</button>{cliente.telefone && <a className="ghost" href={`https://wa.me/55${normalizePhone(cliente.telefone)}`} target="_blank" rel="noreferrer">WhatsApp</a>}</div>
        </div> : <div className="ficha-edit form-grid">
          <div className="row"><label>Nome*<input value={form.nome} onChange={(e) => setForm((f) => ({ ...f, nome: e.target.value }))} /></label><label>Telefone<input value={form.telefone} onChange={(e) => setForm((f) => ({ ...f, telefone: e.target.value }))} /></label></div>
          <div className="row"><label>Cidade<input value={form.cidade} onChange={(e) => setForm((f) => ({ ...f, cidade: e.target.value }))} /></label><label>Endereço<input value={form.endereco} onChange={(e) => setForm((f) => ({ ...f, endereco: e.target.value }))} /></label></div>
          <label>Observações<textarea value={form.obs} onChange={(e) => setForm((f) => ({ ...f, obs: e.target.value }))} /></label>
          <div className="ficha-actions"><button className="primary" onClick={saveCliente} disabled={saving}>{saving ? "Salvando…" : "Salvar"}</button><button className="ghost" onClick={() => { setEditing(false); setForm({ nome: cliente.nome || "", telefone: cliente.telefone || "", cidade: cliente.cidade || "", endereco: cliente.endereco || "", obs: cliente.obs || "" }); }}>Cancelar</button></div>
        </div>}

        <h3 className="ficha-section">Histórico de serviços</h3>
        {!servicos.length ? <div className="empty-state"><b>Nenhum serviço registrado.</b></div> : <div className="ficha-servicos">{servicos.map((s) => { const sugestao = s.sugestao_resposta || ""; const tel = cliente.telefone ? normalizePhone(cliente.telefone) : ""; return <div className={`ficha-servico priority-${s.prioridade || "media"}`} key={s.id}><div className="ficha-servico-main"><strong>{s.titulo}</strong><span>{statusLabel[s.status] || s.status}{s.proxima_acao ? " · " + s.proxima_acao : ""}</span></div><div className="ficha-servico-meta">{s.valor_orcamento ? <b>{money(s.valor_orcamento)}</b> : <span>—</span>}{s.prazo && <time>{compactDate(s.prazo)}</time>}{(sugestao || tel) && <div className="ficha-servico-acoes">{sugestao && <button className="ghost" title="Copiar sugestão" onClick={() => navigator.clipboard.writeText(sugestao)}>📋</button>}{tel && <a className="ghost" href={`https://wa.me/55${tel}${sugestao ? "?text=" + encodeURIComponent(sugestao) : ""}`} target="_blank" rel="noreferrer">WhatsApp</a>}</div>}</div></div>; })}</div>}
        <p className="ficha-note">Mudança de status e financeiro continuam no app atual por enquanto.</p>

        <h3 className="ficha-section">Fotos</h3>
        <div className="foto-grid">
          {fotos.map((f) => <div className="foto" key={f.id}><img src={f.url} alt={f.tipo || "foto"} />{f.tipo && <span className="foto-tag">{f.tipo}</span>}{confirmPhoto === f.id ? <div className="foto-confirm"><button onClick={() => removeFoto(f.id)}>Remover</button><button onClick={() => setConfirmPhoto(null)}>Não</button></div> : <button className="foto-rm" onClick={() => setConfirmPhoto(f.id)}>✕</button>}</div>)}
          <label className="foto-add">{uploading ? "Enviando…" : "+ Foto"}<input type="file" accept="image/*" capture="environment" onChange={(e) => addFoto(e.target.files?.[0])} /></label>
        </div>
      </>}
    </div>
  </div>;
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Home />);
</script>
