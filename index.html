<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#7a3b1f">
<meta name="tb-versao" content="2.1">
<title>Atendimento — Tapeçaria Bahia</title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="./icon.svg">
<style>
  :root{
    --bg:#161210; --bg2:#1e1815; --card:#241d18; --card2:#2b221c;
    --linha:#3a2d24; --texto:#f2e7dc; --texto2:#c7b4a4; --fraco:#98867a;
    --marrom:#b4632f; --marrom-claro:#e08a4f; --creme:#f4e4d4;
    --alta:#e0574f; --media:#e0a23f; --baixa:#5aa06a; --ok:#5aa06a;
    --raio:16px; --sombra:0 6px 20px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:linear-gradient(180deg,var(--bg),var(--bg2));
    color:var(--texto);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.45; -webkit-font-smoothing:antialiased;
    padding:0 0 env(safe-area-inset-bottom);
    max-width:640px; margin:0 auto;
  }
  header{
    position:sticky; top:0; z-index:10;
    background:linear-gradient(180deg,#7a3b1f,#5f2d16);
    padding:calc(14px + env(safe-area-inset-top)) 18px 14px;
    box-shadow:var(--sombra);
  }
  .marca{display:flex; align-items:center; gap:11px}
  .marca img{width:38px; height:38px; border-radius:10px; flex:0 0 auto}
  .marca h1{font-size:1.05rem; margin:0; font-weight:700; letter-spacing:.2px}
  .marca .sub{font-size:.72rem; color:#f4dcc9; opacity:.85; margin-top:1px}
  .barra-status{
    display:flex; align-items:center; justify-content:space-between;
    gap:10px; margin-top:12px; font-size:.76rem; color:#f6e6d8;
  }
  .att{display:flex; align-items:center; gap:6px; min-width:0}
  .att .dot{width:8px; height:8px; border-radius:50%; background:var(--ok); flex:0 0 auto}
  .att.offline .dot{background:var(--media)}
  #btnAtualizar{
    -webkit-appearance:none; appearance:none; border:0; cursor:pointer;
    background:rgba(255,255,255,.16); color:#fff; font-weight:600;
    font-size:.78rem; padding:7px 13px; border-radius:999px; flex:0 0 auto;
    display:flex; align-items:center; gap:6px;
  }
  #btnAtualizar:active{transform:scale(.96)}
  #btnAtualizar.girando svg{animation:girar .8s linear infinite}
  @keyframes girar{to{transform:rotate(360deg)}}

  main{padding:16px 14px 40px}
  .selo-leitura{
    display:inline-flex; align-items:center; gap:6px;
    font-size:.72rem; color:var(--texto2);
    background:var(--card); border:1px solid var(--linha);
    padding:6px 11px; border-radius:999px; margin-bottom:14px;
  }
  .aviso-velho{
    border-radius:var(--raio); padding:11px 13px; margin-bottom:14px;
    font-size:.84rem; border:1px solid #6a4a1e;
    background:#33260f; color:#f0cf9a;
  }
  .aviso-velho.critico{border-color:#6b3029; background:#3a201c; color:#f3c9c2}
  section{margin-bottom:22px}
  .titulo-sec{
    display:flex; align-items:center; gap:8px;
    font-size:.78rem; text-transform:uppercase; letter-spacing:.8px;
    color:var(--marrom-claro); font-weight:700; margin:0 2px 10px;
  }
  .titulo-sec{cursor:pointer; user-select:none}
  .titulo-sec .tit-txt{flex:1}
  .titulo-sec .cont{
    background:var(--card2); color:var(--texto2);
    font-size:.72rem; padding:1px 9px; border-radius:999px; letter-spacing:0;
  }
  .titulo-sec .chev{color:var(--fraco); font-size:1rem; transition:transform .2s; line-height:1}
  section.recolhida .titulo-sec .chev{transform:rotate(-90deg)}
  section.recolhida > :not(.titulo-sec){display:none}
  .b-copy{background:#3a2f12; color:#f0cf9a; border:1px solid #5a4a1e}
  #toast{
    position:fixed; left:50%; bottom:calc(24px + env(safe-area-inset-bottom));
    transform:translateX(-50%) translateY(16px);
    background:#2c5e3f; color:#eafff3; padding:10px 18px; border-radius:999px;
    font-size:.85rem; font-weight:600; opacity:0; pointer-events:none;
    transition:.25s; z-index:100; box-shadow:var(--sombra);
  }
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
  .card{
    background:var(--card); border:1px solid var(--linha);
    border-radius:var(--raio); padding:14px 15px; box-shadow:var(--sombra);
  }
  .resumo{font-size:.98rem; color:var(--texto)}

  .filtros{display:flex; gap:8px; margin:0 0 11px}
  .chip{
    -webkit-appearance:none; appearance:none; cursor:pointer;
    border:1px solid var(--linha); background:var(--card); color:var(--texto2);
    font-size:.78rem; font-weight:600; padding:6px 14px; border-radius:999px;
  }
  .chip.ativo{background:var(--marrom); border-color:var(--marrom); color:#fff}

  .lista{display:flex; flex-direction:column; gap:11px}
  .item{
    background:var(--card); border:1px solid var(--linha);
    border-left:4px solid var(--linha); border-radius:var(--raio);
    padding:13px 14px;
  }
  .item.p-alta{border-left-color:var(--alta)}
  .item.p-media{border-left-color:var(--media)}
  .item.p-baixa{border-left-color:var(--baixa)}
  .item .topo{display:flex; align-items:baseline; gap:8px; justify-content:space-between}
  .item .nome{font-weight:700; font-size:1rem}
  .item .tag{
    font-size:.68rem; padding:2px 8px; border-radius:999px;
    background:var(--card2); color:var(--texto2); white-space:nowrap; flex:0 0 auto;
    text-transform:uppercase; letter-spacing:.4px;
  }
  .item .servico{color:var(--texto2); font-size:.86rem; margin-top:2px}
  .item .meta{display:flex; flex-wrap:wrap; gap:6px 12px; margin-top:8px; font-size:.8rem; color:var(--fraco)}
  .item .meta b{color:var(--texto2); font-weight:600}
  .item .acao{
    margin-top:10px; font-size:.9rem; color:var(--texto);
    background:var(--bg2); border-radius:10px; padding:9px 11px;
  }
  .item .acao .lbl{display:block; font-size:.68rem; text-transform:uppercase; letter-spacing:.5px; color:var(--marrom-claro); margin-bottom:2px}
  .item .rodape{display:flex; align-items:center; gap:8px; margin-top:11px; flex-wrap:wrap}
  .prazo{font-size:.78rem; color:var(--media); font-weight:600; margin-right:auto}
  .prazo.hoje{color:var(--alta)}
  .botao{
    -webkit-appearance:none; appearance:none; border:0; cursor:pointer;
    display:inline-flex; align-items:center; gap:6px; text-decoration:none;
    font-size:.8rem; font-weight:600; padding:7px 13px; border-radius:999px;
  }
  .botao:active{transform:scale(.96)}
  .b-ok{background:#2c5e3f; color:#dff2e5}
  .b-wa{background:#1f7a4d; color:#fff}
  .b-tel{background:var(--card2); color:var(--texto2); border:1px solid var(--linha)}
  .b-nota{background:var(--card2); color:var(--texto2); border:1px solid var(--linha)}
  .b-cinza{background:var(--card2); color:var(--texto2); border:1px solid var(--linha)}

  .alerta{
    background:linear-gradient(180deg,var(--card2),var(--card));
    border:1px solid #4a3323; border-left:4px solid var(--media);
    border-radius:var(--raio); padding:12px 14px;
  }
  .alerta.prazo{border-left-color:var(--alta)}
  .alerta .cab{display:flex; align-items:center; gap:8px; font-weight:700; font-size:.95rem}
  .alerta .det{color:var(--texto2); font-size:.85rem; margin-top:5px}

  .agenda-item{display:flex; align-items:center; gap:12px; padding:10px 2px; border-bottom:1px solid var(--linha)}
  .agenda-item:last-child{border-bottom:0}
  .agenda-item .hora{font-weight:700; color:var(--marrom-claro); font-variant-numeric:tabular-nums; flex:0 0 auto; width:48px}
  .agenda-item .desc{font-size:.92rem; flex:1}
  .agenda-item .desc .loc{color:var(--fraco); font-size:.78rem}
  .agenda-item .b-ok{padding:6px 10px; flex:0 0 auto}

  .fin-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px}
  .fin-cel{background:var(--bg2); border-radius:12px; padding:10px 12px}
  .fin-cel .rot{font-size:.72rem; color:var(--fraco); text-transform:uppercase; letter-spacing:.4px}
  .fin-cel .val{font-size:1.12rem; font-weight:700; font-variant-numeric:tabular-nums; margin-top:2px}
  .val.pos{color:var(--ok)} .val.neg{color:var(--alta)}
  .fin-ref{font-size:.74rem; color:var(--fraco); margin-top:10px}
  .borrado .val{filter:blur(8px); user-select:none}
  #btnFin{margin-top:11px}

  .feito{opacity:.55}
  .feito .desc, .feito .nome{text-decoration:line-through}
  .conc-item{display:flex; align-items:center; gap:10px; padding:9px 2px; border-bottom:1px solid var(--linha); font-size:.86rem}
  .conc-item:last-child{border-bottom:0}
  .conc-item .rot{flex:1; color:var(--texto2); text-decoration:line-through}

  .vazio{color:var(--fraco); font-size:.88rem; text-align:center; padding:14px}
  .erro{background:#3a201c; border:1px solid #6b3029; color:#f3c9c2; border-radius:var(--raio); padding:14px; font-size:.88rem}
  .rodape-app{text-align:center; color:var(--fraco); font-size:.72rem; margin-top:8px; padding:0 10px}
  .esqueleto{height:70px; border-radius:var(--raio); background:linear-gradient(90deg,var(--card),var(--card2),var(--card)); background-size:200% 100%; animation:brilho 1.3s infinite}
  @keyframes brilho{to{background-position:-200% 0}}
</style>
</head>
<body>
<header>
  <div class="marca">
    <img src="./icon.svg" alt="">
    <div>
      <h1>Atendimento</h1>
      <div class="sub">Tapeçaria e Estofados Bahia · Luziânia-GO</div>
    </div>
  </div>
  <div class="barra-status">
    <div class="att" id="att"><span class="dot"></span><span id="attTxt">Carregando…</span></div>
    <button id="btnAtualizar" aria-label="Atualizar">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
      Atualizar
    </button>
  </div>
</header>

<main>
  <div class="selo-leitura">🔒 Suas conclusões ficam neste aparelho e vão pro Claude via Meu Vivo</div>
  <div id="conteudo">
    <div class="lista">
      <div class="esqueleto"></div><div class="esqueleto"></div><div class="esqueleto"></div>
    </div>
  </div>
  <div class="rodape-app" id="rodapeApp"></div>
</main>

<script>
/* =========================================================================
   DE ONDE VÊM OS DADOS:
   - Teste local (localhost): lê o arquivo ao lado.
   - Publicado (GitHub Pages): lê o Gist SECRETO (link não listado/indexado,
     CORS liberado). A rotina do Claude escreve os dados e faz git push no
     Gist toda noite.
   INTERAÇÃO (v2): concluir/anotar grava no aparelho (localStorage) e envia
   um comando "PAINEL ..." pro Meu Vivo via compartilhar — a rotina noturna
   lê o Meu Vivo e aplica no sistema. Nada é enviado a cliente por aqui.
   ========================================================================= */
const EH_LOCAL = ['localhost', '127.0.0.1', ''].includes(location.hostname);
const FONTE_DADOS = EH_LOCAL
  ? './dados_atendimento.json'
  : 'https://gist.githubusercontent.com/dieegguin-byte/e837448593fcd4fcea82096b942d93d4/raw/dados_atendimento.json';

const LS_DONE = 'tb_done_v2';
const LS_FIN  = 'tb_fin_visivel';
let DADOS = null;
let FILTRO = 'todos';

const $ = (s, r=document) => r.querySelector(s);
const el = (tag, cls, txt) => { const e=document.createElement(tag); if(cls)e.className=cls; if(txt!=null)e.textContent=txt; return e; };
const esc = (s) => (s==null?'':String(s));

function lerDone(){ try{ return JSON.parse(localStorage.getItem(LS_DONE))||{} }catch(e){ return {} } }
function salvarDone(d){ try{ localStorage.setItem(LS_DONE, JSON.stringify(d)) }catch(e){} }
function limparDoneAntigos(){
  const d=lerDone(); const agora=Date.now(); let mudou=false;
  for(const k in d){ if(agora - new Date(d[k]).getTime() > 14*86400e3){ delete d[k]; mudou=true; } }
  if(mudou) salvarDone(d);
}
function chave(tipo,a,b){ return tipo+'|'+esc(a)+'|'+esc(b); }
function marcar(k, rotulo){
  const d=lerDone(); d[k]=new Date().toISOString(); salvarDone(d);
  render(DADOS);
  compartilhar('PAINEL ✔ Concluído: '+rotulo+' ('+new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})+')');
}
function desmarcar(k){ const d=lerDone(); delete d[k]; salvarDone(d); render(DADOS); }

async function compartilhar(texto){
  try{
    if(navigator.share){ await navigator.share({text:texto}); return; }
  }catch(e){ if(e && e.name==='AbortError') return; }
  try{ await navigator.clipboard.writeText(texto); alert('Copiado! Cole na conversa "Meu Vivo" do WhatsApp.'); }
  catch(e){ prompt('Copie e cole no Meu Vivo:', texto); }
}

function toast(msg){
  let t=document.getElementById('toast');
  if(!t){ t=document.createElement('div'); t.id='toast'; document.body.appendChild(t); }
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'), 1900);
}
async function copiarTexto(txt){
  try{ await navigator.clipboard.writeText(txt); toast('📋 Sugestão copiada'); }
  catch(e){
    try{ if(navigator.share){ await navigator.share({text:txt}); return; } }catch(e2){ if(e2&&e2.name==='AbortError') return; }
    prompt('Copie o texto:', txt);
  }
}

function moedaBR(n){
  if(typeof n!=='number' || isNaN(n)) return '—';
  return n.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
}
function tempoRelativo(iso){
  const d = new Date(iso); if(isNaN(d)) return esc(iso);
  const abs = Math.abs((Date.now()-d.getTime())/1000);
  const fmt = new Intl.DateTimeFormat('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
  let rel;
  if(abs<90) rel='agora mesmo';
  else if(abs<3600) rel=`há ${Math.round(abs/60)} min`;
  else if(abs<86400) rel=`há ${Math.round(abs/3600)} h`;
  else rel=`há ${Math.round(abs/86400)} dia(s)`;
  return `${rel} · ${fmt.format(d)}`;
}
function dataCurtaBR(iso){
  if(!iso) return '';
  const d=new Date(iso+'T00:00:00'); if(isNaN(d)) return esc(iso);
  return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
}
function ehHoje(iso){
  if(!iso) return false;
  const h=new Date(); const s=`${h.getFullYear()}-${String(h.getMonth()+1).padStart(2,'0')}-${String(h.getDate()).padStart(2,'0')}`;
  return iso===s;
}
function telParaWa(tel){
  const num=String(tel||'').replace(/\D/g,'');
  return num.length>=10 ? 'https://wa.me/'+num : null;
}
function telParaLigar(tel){
  const num=String(tel||'').replace(/\D/g,'');
  return num.length>=10 ? 'tel:+'+num : null;
}

function lerColapsadas(){ try{ return JSON.parse(localStorage.getItem('tb_colapsadas'))||{} }catch(e){ return {} } }
function salvarColapsadas(d){ try{ localStorage.setItem('tb_colapsadas', JSON.stringify(d)) }catch(e){} }
function secao(titulo, count){
  const s=el('section');
  const t=el('div','titulo-sec');
  t.appendChild(el('span','tit-txt',titulo));
  if(count!=null){ const c=el('span','cont',String(count)); t.appendChild(c); }
  t.appendChild(el('span','chev','⌄'));
  if(lerColapsadas()[titulo]) s.classList.add('recolhida');
  t.addEventListener('click',()=>{
    s.classList.toggle('recolhida');
    const d=lerColapsadas();
    if(s.classList.contains('recolhida')) d[titulo]=true; else delete d[titulo];
    salvarColapsadas(d);
  });
  s.appendChild(t);
  return s;
}
function botao(cls, rotulo, fn){
  const b=el('button','botao '+cls, rotulo); b.type='button'; b.onclick=fn; return b;
}
function linkBotao(cls, rotulo, href){
  const a=el('a','botao '+cls, rotulo); a.href=href; a.target='_blank'; a.rel='noopener'; return a;
}

function render(d){
  if(!d) return;
  const done = lerDone();
  const concluidos = []; // {k, rotulo, quando}
  const c = $('#conteudo'); c.innerHTML='';

  // Aviso de dados velhos (rotina pode ter falhado / estar pausada)
  if(d.meta && d.meta.atualizado_em){
    const horas = (Date.now() - new Date(d.meta.atualizado_em).getTime())/3600e3;
    if(horas > 26){
      const av = el('div','aviso-velho'+(horas>50?' critico':''));
      av.textContent = '⚠️ Dados atualizados '+tempoRelativo(d.meta.atualizado_em)+'. A rotina noturna pode não ter rodado (ou está pausada).';
      c.appendChild(av);
    }
  }

  // Resumo do dia
  if(d.resumo_do_dia){
    const s=secao('Resumo do dia');
    const card=el('div','card'); const p=el('p','resumo',d.resumo_do_dia); p.style.margin='0';
    card.appendChild(p); s.appendChild(card); c.appendChild(s);
  }

  // Alertas / decidir
  const alertas=(d.alertas||[]);
  const alertasAtivos = alertas.filter(a=>!done[chave('al',a.titulo,a.prazo)]);
  alertas.forEach(a=>{ const k=chave('al',a.titulo,a.prazo); if(done[k]) concluidos.push({k, rotulo:a.titulo, quando:done[k]}); });
  if(alertasAtivos.length){
    const s=secao('Precisa decidir / prazos', alertasAtivos.length);
    const lista=el('div','lista');
    alertasAtivos.forEach(a=>{
      const k=chave('al',a.titulo,a.prazo);
      const box=el('div','alerta'+(a.tipo==='prazo'?' prazo':''));
      const cab=el('div','cab');
      cab.appendChild(el('span',null, a.tipo==='prazo'?'⏰':'✅'));
      cab.appendChild(el('span',null,a.titulo||''));
      box.appendChild(cab);
      if(a.detalhe) box.appendChild(el('div','det',a.detalhe));
      const rod=el('div','rodape');
      if(a.prazo) rod.appendChild(el('span','prazo'+(ehHoje(a.prazo)?' hoje':''),'Prazo: '+dataCurtaBR(a.prazo)));
      rod.appendChild(botao('b-ok','✔ Concluir',()=>marcar(k, a.titulo||'alerta')));
      if(a.detalhe) rod.appendChild(botao('b-copy','📋 Copiar',()=>copiarTexto(a.detalhe)));
      box.appendChild(rod);
      lista.appendChild(box);
    });
    s.appendChild(lista); c.appendChild(s);
  }

  // Agenda de hoje
  const agenda=d.agenda_hoje||[];
  {
    const s=secao('Agenda de hoje', agenda.length);
    const card=el('div','card');
    if(!agenda.length){ card.appendChild(el('div','vazio','Sem compromissos para hoje.')); }
    else agenda.forEach(a=>{
      const k=chave('ag',a.hora,a.titulo);
      const feito = !!done[k];
      const it=el('div','agenda-item'+(feito?' feito':''));
      it.appendChild(el('div','hora',a.hora||'--'));
      const desc=el('div','desc'); desc.appendChild(el('div',null,a.titulo||''));
      if(a.local) desc.appendChild(el('div','loc','📍 '+a.local));
      it.appendChild(desc);
      it.appendChild(feito
        ? botao('b-cinza','↩',()=>desmarcar(k))
        : botao('b-ok','✔',()=>marcar(k,(a.hora?a.hora+' ':'')+(a.titulo||'compromisso'))));
      card.appendChild(it);
    });
    s.appendChild(card); c.appendChild(s);
  }

  // Clientes / precisa de atenção (com filtros)
  const leadsTodos=(d.precisa_atencao||[]);
  leadsTodos.forEach(l=>{ const k=chave('cl',l.cliente,l.servico); if(done[k]) concluidos.push({k, rotulo:(l.cliente||'')+' — '+(l.servico||''), quando:done[k]}); });
  let leads = leadsTodos.filter(l=>!done[chave('cl',l.cliente,l.servico)]);
  const totalAtivos = leads.length;
  if(FILTRO==='alta')  leads = leads.filter(l=>l.prioridade==='alta');
  if(FILTRO==='prazo') leads = leads.filter(l=>!!l.prazo);
  {
    const ordem={alta:0,media:1,baixa:2};
    leads.sort((a,b)=>(ordem[a.prioridade]??1)-(ordem[b.prioridade]??1));
    const s=secao('Clientes / precisa de atenção', totalAtivos);
    if(totalAtivos>1){
      const f=el('div','filtros');
      [['todos','Todos'],['alta','🔴 Alta'],['prazo','⏰ Com prazo']].forEach(([id,rot])=>{
        const b=el('button','chip'+(FILTRO===id?' ativo':''),rot); b.type='button';
        b.onclick=()=>{ FILTRO=id; render(DADOS); };
        f.appendChild(b);
      });
      s.appendChild(f);
    }
    if(!leads.length){
      const card=el('div','card');
      card.appendChild(el('div','vazio', totalAtivos? 'Nenhum item neste filtro.' : 'Nada aguardando ação. 👏'));
      s.appendChild(card);
    } else {
      const lista=el('div','lista');
      leads.forEach(l=>{
        const k=chave('cl',l.cliente,l.servico);
        const rotulo=(l.cliente||'Sem nome')+(l.servico?' — '+l.servico:'');
        const it=el('div','item p-'+(l.prioridade||'media'));
        const topo=el('div','topo');
        topo.appendChild(el('div','nome',l.cliente||'Sem nome'));
        if(l.status) topo.appendChild(el('div','tag',l.status));
        it.appendChild(topo);
        if(l.servico) it.appendChild(el('div','servico',l.servico));
        const meta=el('div','meta');
        if(l.cidade){ const m=el('span'); m.innerHTML='<b>Cidade:</b> '+esc(l.cidade); meta.appendChild(m); }
        if(l.telefone){ const m=el('span'); m.innerHTML='<b>Tel:</b> '+esc(l.telefone); meta.appendChild(m); }
        if(l.origem){ const m=el('span'); m.innerHTML='<b>Origem:</b> '+esc(l.origem); meta.appendChild(m); }
        if(meta.childNodes.length) it.appendChild(meta);
        if(l.proxima_acao){
          const ac=el('div','acao'); ac.appendChild(el('span','lbl','Próxima ação'));
          ac.appendChild(document.createTextNode(l.proxima_acao)); it.appendChild(ac);
        }
        const rod=el('div','rodape');
        if(l.prazo) rod.appendChild(el('span','prazo'+(ehHoje(l.prazo)?' hoje':''),(ehHoje(l.prazo)?'Hoje':'Prazo '+dataCurtaBR(l.prazo))));
        rod.appendChild(botao('b-ok','✔',()=>marcar(k,rotulo)));
        const sugestao = l.sugestao_resposta || l.proxima_acao || '';
        if(sugestao) rod.appendChild(botao('b-copy','📋 Copiar sugestão',()=>copiarTexto(sugestao)));
        const wa=telParaWa(l.telefone);
        if(wa){ const href = sugestao ? wa+'?text='+encodeURIComponent(sugestao) : wa; rod.appendChild(linkBotao('b-wa','WhatsApp',href)); }
        const tel=telParaLigar(l.telefone); if(tel){ const a=linkBotao('b-tel','📞 Ligar',tel); a.removeAttribute('target'); rod.appendChild(a); }
        it.appendChild(rod);
        lista.appendChild(it);
      });
      s.appendChild(lista);
    }
    c.appendChild(s);
  }

  // Financeiro pendente
  const finPend=d.financeiro_pendente||[];
  if(finPend.length){
    const s=secao('Financeiro a confirmar', finPend.length);
    const lista=el('div','lista');
    finPend.forEach(f=>{
      const k=chave('fp',f.descricao,'');
      if(done[k]){ concluidos.push({k, rotulo:f.descricao, quando:done[k]}); return; }
      const it=el('div','item p-media');
      it.appendChild(el('div','servico',f.descricao||''));
      const rod=el('div','rodape');
      if(f.status){ const t=el('div','tag',f.status); rod.appendChild(t); }
      rod.appendChild(botao('b-ok','✔ Resolvido',()=>marcar(k, f.descricao||'financeiro')));
      it.appendChild(rod);
      lista.appendChild(it);
    });
    if(lista.childNodes.length){ s.appendChild(lista); c.appendChild(s); }
  }

  // Resumo financeiro (privado por padrão)
  const fr=d.financeiro_resumo;
  if(fr){
    const visivel = localStorage.getItem(LS_FIN)==='1';
    const s=secao('Resumo financeiro');
    const card=el('div','card'+(visivel?'':' borrado'));
    const grid=el('div','fin-grid');
    const cel=(rot,val,cls)=>{ const x=el('div','fin-cel'); x.appendChild(el('div','rot',rot)); x.appendChild(el('div','val'+(cls?' '+cls:''),moedaBR(val))); return x; };
    grid.appendChild(cel('Entradas',fr.entradas,'pos'));
    grid.appendChild(cel('Saídas',fr.saidas,'neg'));
    grid.appendChild(cel('Lucro',fr.lucro, fr.lucro>=0?'pos':'neg'));
    grid.appendChild(cel('Sobra p/ Diego',fr.sobra_real_diego, fr.sobra_real_diego>=0?'pos':'neg'));
    card.appendChild(grid);
    if(fr.referencia) card.appendChild(el('div','fin-ref',fr.referencia));
    const btnFin=botao('b-cinza', visivel?'🙈 Ocultar valores':'👁 Mostrar valores', ()=>{
      localStorage.setItem(LS_FIN, visivel?'0':'1'); render(DADOS);
    });
    btnFin.id='btnFin';
    card.appendChild(btnFin);
    s.appendChild(card); c.appendChild(s);
  }

  // Concluídos (neste aparelho)
  if(concluidos.length){
    const s=secao('Concluídos por você', concluidos.length);
    const card=el('div','card');
    concluidos.sort((a,b)=> new Date(b.quando)-new Date(a.quando));
    concluidos.forEach(x=>{
      const it=el('div','conc-item');
      it.appendChild(el('span',null,'✔'));
      it.appendChild(el('span','rot',x.rotulo));
      it.appendChild(botao('b-cinza','↩ Desfazer',()=>desmarcar(x.k)));
      it.appendChild(botao('b-cinza','📤',()=>compartilhar('PAINEL ✔ Concluído: '+x.rotulo)));
      card.appendChild(it);
    });
    const nota=el('div','fin-ref','Marcações ficam neste aparelho. O 📤 manda pro "Meu Vivo" — a rotina noturna dá baixa no sistema.');
    card.appendChild(nota);
    s.appendChild(card); c.appendChild(s);
  }

  // atualizado em
  const att=$('#att'), attTxt=$('#attTxt');
  att.classList.remove('offline');
  attTxt.textContent = d.meta && d.meta.atualizado_em ? 'Atualizado '+tempoRelativo(d.meta.atualizado_em) : 'Atualizado';
  $('#rodapeApp').textContent = (d.meta && d.meta.gerado_por ? d.meta.gerado_por+' · ' : '') + 'Painel v2 · leitura + conclusão via Meu Vivo';
}

function mostrarErro(msg){
  const c=$('#conteudo'); c.innerHTML='';
  const e=el('div','erro'); e.innerHTML='⚠️ '+esc(msg)+'<br><br>Toque em <b>Atualizar</b> para tentar de novo.';
  c.appendChild(e);
  const att=$('#att'); att.classList.add('offline'); $('#attTxt').textContent='Sem conexão com os dados';
}

async function carregar(){
  const btn=$('#btnAtualizar'); btn.classList.add('girando');
  try{
    const url = FONTE_DADOS + (FONTE_DADOS.includes('?')?'&':'?') + 't=' + Date.now();
    const resp = await fetch(url, {cache:'no-store'});
    if(!resp.ok) throw new Error('HTTP '+resp.status);
    DADOS = await resp.json();
    render(DADOS);
  }catch(err){
    try{
      const resp = await fetch(FONTE_DADOS);
      DADOS = await resp.json();
      render(DADOS);
      $('#att').classList.add('offline'); $('#attTxt').textContent='Offline · mostrando última versão salva';
    }catch(e2){
      mostrarErro('Não consegui carregar os dados ('+err.message+').');
    }
  }finally{
    btn.classList.remove('girando');
  }
}

limparDoneAntigos();
$('#btnAtualizar').addEventListener('click', carregar);
document.addEventListener('visibilitychange', ()=>{ if(!document.hidden) carregar(); });
window.addEventListener('online', carregar);
window.addEventListener('offline', ()=>{ $('#att').classList.add('offline'); $('#attTxt').textContent='Sem internet'; });

carregar();

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=> navigator.serviceWorker.register('./sw.js').catch(()=>{}) );
}
</script>
</body>
</html>
